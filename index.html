<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BLINK FIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --px: 'Press Start 2P', 'Courier New', monospace;
      --ko: 'Courier New', monospace;
      --bg: #06060f; --dark: #0a0a1a; --yellow: #ffeb3b;
      --green: #00ff88; --red: #f44336; --dim: #1a1a2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    #gameCanvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    #video { position: absolute; visibility: hidden; width: 0; height: 0; }
    #camCanvas {
      position: fixed; bottom: 12px; right: 12px;
      width: min(160px, 22vw); height: min(120px, 16.5vw);
      border: 2px solid #2a2a3a; border-radius: 0;
      transform: scaleX(-1); opacity: 0.75;
      image-rendering: pixelated;
    }

    /* ── 스캔라인 믹스인 (CRT 효과) ── */
    .scanlines {
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }

    /* ── 로딩 화면 ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 22px; z-index: 30;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }
    #loading.hidden { display: none; }
    #loading .px-logo {
      font-family: var(--px); font-size: clamp(14px,4vw,22px);
      color: var(--yellow); letter-spacing: 8px;
      text-shadow: 3px 3px 0 #000, 0 0 30px rgba(255,235,59,0.25);
    }
    #loading .px-sub  { font-family: var(--ko); font-size: 12px; color: #444; letter-spacing: 1px; }
    #loading .px-hint { font-family: var(--ko); font-size: 12px; color: #666;
                        animation: px-blink 1s steps(1) infinite; }
    #loading .px-hint::before { content: '▶  '; color: var(--green); }

    /* ── 픽셀 윈도우 오버레이 ── */
    #scoreOverlay {
      position: fixed; inset: 0; background: rgba(6,6,15,0.93);
      display: flex; align-items: center; justify-content: center; z-index: 20;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
      );
    }
    #scoreOverlay.hidden { display: none; }

    .score-box {
      width: min(380px, 90vw);
      background: var(--dark);
      border: 3px solid var(--yellow);
      border-radius: 0;
      box-shadow: 5px 5px 0 #000, 8px 8px 0 rgba(255,235,59,0.1);
      overflow: hidden;
    }

    /* 타이틀바 */
    .px-titlebar {
      background: var(--yellow); color: #000;
      font-family: var(--px); font-size: 9px;
      padding: 9px 14px; letter-spacing: 3px;
      text-align: center;
      border-bottom: 2px solid #000;
    }

    /* 내용 영역 */
    .px-body {
      padding: 18px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    .go-nums {
      font-family: var(--px); font-size: 9px; color: #fff;
      text-align: center; line-height: 2.5;
    }
    .go-nums span { color: var(--yellow); }

    .go-desc {
      font-family: var(--ko); font-size: 11px; color: #444;
      text-align: center; line-height: 1.9;
      border-top: 1px solid var(--dim); padding-top: 10px; width: 100%;
    }

    /* 랭킹 미리보기 */
    #lbPreview {
      width: 100%; background: #050510;
      border: 1px solid var(--dim);
      padding: 10px 12px;
    }
    #lbPreview .lb-title {
      font-family: var(--px); font-size: 7px;
      color: var(--yellow); letter-spacing: 3px; margin-bottom: 7px;
    }
    #lbPreview .lb-rows  { font-family: var(--ko); font-size: 11px; line-height: 2; color: #555; }
    #lbPreview .lb-me    { color: var(--green); }

    /* 입력창 */
    #nickInput {
      background: #050510; border: 2px solid #2a2a3a; border-radius: 0;
      color: var(--yellow); font-family: var(--ko);
      font-size: clamp(13px, 3.5vw, 15px);
      padding: 10px 14px; text-align: center; width: 100%;
      outline: none; letter-spacing: 2px; caret-color: var(--yellow);
    }
    #nickInput:focus { border-color: var(--yellow); }
    #nickInput::placeholder { color: #252535; font-size: 11px; letter-spacing: 1px; }

    /* 버튼 — 프라이머리 */
    .px-btn {
      background: var(--yellow); border: none; border-radius: 0; color: #000;
      cursor: pointer; font-family: var(--px);
      font-size: clamp(7px, 2vw, 9px);
      padding: 13px 8px; width: 100%; letter-spacing: 2px;
      box-shadow: 3px 3px 0 #000;
      transition: transform .06s, box-shadow .06s;
    }
    .px-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }

    /* 버튼 — 고스트 */
    .px-btn-ghost {
      background: none; border: 1px solid #252535; border-radius: 0;
      color: #444; cursor: pointer; font-family: var(--ko);
      font-size: 11px; padding: 8px; width: 100%; letter-spacing: 1px;
    }
    .px-btn-ghost:hover { color: #777; border-color: #444; }

    /* 섹션 show/hide */
    #retrySection { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    #retrySection.hidden { display: none; }
    #nickSection.hidden  { display: none; }

    .retry-msg   { font-family: var(--ko); font-size: 12px; color: var(--green); text-align: center; }
    .retry-score { font-family: var(--px); font-size: 8px; color: #888; text-align: center; line-height: 2.5; }
    .retry-score span { color: var(--yellow); }

    /* ── 카메라 안내 메시지 ── */
    #camGuide {
      display: none;
      margin-top: 18px;
      text-align: center;
    }
    #camGuide .cg-arrow {
      font-family: var(--px); font-size: 7px; color: var(--yellow);
      letter-spacing: 1px; margin-bottom: 8px;
      animation: px-blink 1s step-start infinite;
    }
    #camGuide .cg-text {
      font-family: var(--ko); font-size: 12px; color: #aaa;
      line-height: 1.8;
    }
    #camGuide .cg-text em {
      font-style: normal; color: var(--yellow);
    }

    #muteBtn {
      position: fixed; bottom: 14px; left: 14px; z-index: 20;
      font-family: var(--px); font-size: 13px;
      background: #0a0a1a; border: 2px solid #00ff88; border-radius: 0;
      color: #00ff88; cursor: pointer; padding: 6px 12px; letter-spacing: 1px;
      box-shadow: 0 0 8px rgba(0,255,136,0.3);
      transition: color .1s, border-color .1s, box-shadow .1s;
    }
    #muteBtn:hover { color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 8px rgba(255,235,59,0.4); }
    #muteBtn.muted { color: #444; border-color: #333; box-shadow: none; }

    @keyframes px-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>

<script>
// ─── UPSTASH CONFIG ──────────────────────────────────────────────────────────
// 주의: 이 토큰은 클라이언트에 노출됩니다. 랭킹 전용 키 사용을 권장해요.
const UPSTASH_URL   = 'https://close-dane-70929.upstash.io'
const UPSTASH_TOKEN = 'gQAAAAAAARURAAIncDI0MWU4MTVhNTcxNTU0ZTM2OTM1OWUyZDYxOTU5YTFmYnAyNzA5Mjk'
const LB_KEY        = 'blinkfire:lb'

async function upstashGet(...args) {
  try {
    const path = args.map(a => encodeURIComponent(String(a))).join('/')
    const res  = await fetch(`${UPSTASH_URL}/${path}`, {
      headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }
    })
    const json = await res.json()
    return json.result
  } catch { return null }
}

async function submitScore(nick, sc) {
  // ZADD GT: 더 높은 점수만 업데이트
  await upstashGet('zadd', LB_KEY, 'gt', sc, nick)
}

async function fetchLeaderboard() {
  const raw = await upstashGet('zrevrange', LB_KEY, 0, 14, 'withscores')
  if (!Array.isArray(raw)) return []
  const entries = []
  for (let i = 0; i < raw.length; i += 2) {
    entries.push({ nick: raw[i], score: Number(raw[i + 1]) })
  }
  return entries
}

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas')
const ctx     = canvas.getContext('2d')
const video   = document.getElementById('video')
const camCv   = document.getElementById('camCanvas')
const camCtx  = camCv.getContext('2d')
const loading = document.getElementById('loading')

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
resize()
window.addEventListener('resize', resize)

// ─── PIXEL FONT (5×5) ────────────────────────────────────────────────────────
const FONT = {
  '0':['111','101','101','101','111'],'1':['010','110','010','010','111'],
  '2':['111','001','111','100','111'],'3':['111','001','111','001','111'],
  '4':['101','101','111','001','001'],'5':['111','100','111','001','111'],
  '6':['111','100','111','101','111'],'7':['111','001','001','001','001'],
  '8':['111','101','111','101','111'],'9':['111','101','111','001','111'],
  'A':['111','101','111','101','101'],'B':['110','101','110','101','110'],
  'C':['111','100','100','100','111'],'D':['110','101','101','101','110'],
  'E':['111','100','111','100','111'],'F':['111','100','111','100','100'],
  'G':['111','100','101','101','111'],'H':['101','101','111','101','101'],
  'I':['111','010','010','010','111'],'K':['101','110','100','110','101'],
  'L':['100','100','100','100','111'],'M':['101','111','101','101','101'],
  'N':['101','111','111','101','101'],'O':['111','101','101','101','111'],
  'P':['111','101','111','100','100'],'R':['111','101','111','110','101'],
  'S':['111','100','111','001','111'],'T':['111','010','010','010','010'],
  'U':['101','101','101','101','111'],'V':['101','101','101','010','010'],
  'W':['101','101','101','111','101'],'X':['101','010','010','010','101'],
  'Y':['101','101','010','010','010'],'Z':['111','001','010','100','111'],
  ' ':['000','000','000','000','000'],':':['000','010','000','010','000'],
  '!':['010','010','010','000','010'],'-':['000','000','111','000','000'],
  '+':['000','010','111','010','000'],'/':['001','001','010','100','100'],
  '.':['000','000','000','000','010'],'#':['010','111','010','111','010'],
}
function drawText(text, x, y, color = '#fff', sz = 2) {
  text = String(text).toUpperCase(); let cx = x
  for (const ch of text) {
    const g = FONT[ch] || FONT[' ']
    g.forEach((row, ry) => [...row].forEach((px, rx) => {
      if (px === '1') { ctx.fillStyle = color; ctx.fillRect(Math.floor(cx+rx*sz), Math.floor(y+ry*sz), sz, sz) }
    }))
    cx += 4 * sz
  }
}
function textW(text, sz = 2) { return String(text).length * 4 * sz }

// ─── SPRITES ─────────────────────────────────────────────────────────────────
const SP = {
  slime: {
    frames: [
      ['..GGG...','.GGGGG..','GG.G.GGG','GGGGGGG.','GGGG.GGG','.GGGGG..','..GGG...','........'],
      ['..GGG...','.GGGGG..','GG.G.GGG','GGGGGGG.','GGG.GGGG','.GGGGG..','..GGG...','........'],
    ], c: { G:'#4caf50' }, w:8, h:8,
  },
  bat: {
    frames: [
      ['P..PP..P','PPPPPPPP','.PPPPPP.','..PPPP..','...PP...'],
      ['P..PP..P','.PPPPPP.','..PPPP..','...PP...','....P...'],
    ], c: { P:'#9c27b0' }, w:8, h:5,
  },
  skeleton: {
    frames: [
      ['.WWWWWW.','W.W..W.W','WWWWWWWW','.W.WW.W.','W.WWWW.W','.W.WW.W.','..W..W..','........'],
      ['.WWWWWW.','W.W..W.W','WWWWWWWW','.W.WW.W.','WW.WW.WW','.W.WW.W.','..W..W..','........'],
    ], c: { W:'#eceff1' }, w:8, h:8,
  },
  heart: {
    frames: [['.R.R....','RRRRRR..','RRRRRR..','RRRRRR..','RRRRRR..','RRRRRR..','RRRRR...','RRRR....','RR......']],
    c: { R:'#e53935' }, w:8, h:9,
  },
}
const SC = 5
function drawSprite(key, x, y, frame = 0, tint = null) {
  const s = SP[key]; const art = s.frames[frame % s.frames.length]
  art.forEach((row, ry) => [...row].forEach((ch, rx) => {
    if (ch === '.') return
    ctx.fillStyle = tint ?? s.c[ch] ?? '#fff'
    ctx.fillRect(Math.floor(x+rx*SC), Math.floor(y+ry*SC), SC, SC)
  }))
}

// ─── STARS ───────────────────────────────────────────────────────────────────
const stars = Array.from({length:100}, () => ({
  x: Math.random()*2000, y: Math.random()*1200,
  s: Math.random()<0.2?2:1, v: 0.3+Math.random()*0.6, b: 0.3+Math.random()*0.7,
}))
function updateStars(dt) {
  for (const st of stars) { st.x -= st.v; if (st.x<0) {st.x=canvas.width; st.y=Math.random()*canvas.height} }
}
function drawStars() {
  for (const st of stars) {
    ctx.fillStyle = `rgba(255,255,255,${st.b})`
    ctx.fillRect(Math.floor(st.x), Math.floor(st.y), st.s, st.s)
  }
}

// ─── SOUND ENGINE (Web Audio API 칩튠) ───────────────────────────────────────
const _ac = new (window.AudioContext || window.webkitAudioContext)()

function _beep(freq, dur, vol=0.3, type='square', freqEnd=null) {
  const o=_ac.createOscillator(), g=_ac.createGain()
  o.connect(g); g.connect(_ac.destination)
  o.type=type; o.frequency.setValueAtTime(freq, _ac.currentTime)
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, _ac.currentTime+dur)
  g.gain.setValueAtTime(vol, _ac.currentTime)
  g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime+dur)
  o.start(); o.stop(_ac.currentTime+dur)
}
function _seq(notes) {   // [{f, d, v?, t?}]
  let t=_ac.currentTime
  notes.forEach(n => {
    const o=_ac.createOscillator(), g=_ac.createGain()
    o.connect(g); g.connect(_ac.destination)
    o.type=n.t||'square'
    o.frequency.setValueAtTime(n.f, t)
    if (n.f2) o.frequency.exponentialRampToValueAtTime(n.f2, t+n.d)
    g.gain.setValueAtTime(n.v||0.25, t)
    g.gain.exponentialRampToValueAtTime(0.001, t+n.d)
    o.start(t); o.stop(t+n.d)
    t+=n.d
  })
}

const SFX = {
  shootWeak()  { _beep(520, 0.07, 0.18, 'square', 880) },
  shootStrong(){ _beep(180, 0.05, 0.35, 'square', 80); _beep(440, 0.12, 0.20, 'square', 220) },
  hit()        { _beep(300, 0.05, 0.15, 'square', 250) },
  kill()       { _beep(600, 0.08, 0.22, 'square', 200) },
  combo(n)     { _beep(300+n*60, 0.09, 0.22, 'square') },
  loseLife()   { _seq([{f:320,d:0.12},{f:240,d:0.12},{f:160,d:0.22}]) },
  waveClear()  { _seq([{f:330,d:0.1},{f:440,d:0.1},{f:550,d:0.1},{f:660,d:0.22}]) },
  gameOver()   { _seq([{f:440,d:0.15},{f:330,d:0.15},{f:220,d:0.15},{f:110,d:0.35}]) },
  gameStart()  { _seq([{f:330,d:0.08},{f:440,d:0.08},{f:550,d:0.08},{f:660,d:0.15}]) },
}

// ─── BGM (배경음악) ──────────────────────────────────────────────────────────
const BGM = (() => {
  const BPM=140, B=60/BPM

  // 멜로디 [Hz, 박자] — 0=쉼표 / 총 16박자
  const MEL = [
    [784,0.5],[659,0.5],[698,0.5],[784,0.5],  // G5 E5 F5 G5
    [880,0.5],[784,0.5],[698,0.5],[659,0.5],  // A5 G5 F5 E5
    [587,0.5],[659,0.5],[698,0.5],[784,0.5],  // D5 E5 F5 G5
    [659,0.5],[0,0.5],[659,0.5],[0,0.5],      // E5 _ E5 _
    [784,0.5],[659,0.5],[698,0.5],[784,0.5],  // G5 E5 F5 G5
    [880,1  ],[784,0.5],[698,0.5],            // A5(긴) G5 F5
    [659,1  ],[587,0.5],[523,0.5],            // E5(긴) D5 C5
    [523,2  ],                                // C5(홀드)
  ]  // 합계: 16박자

  // 베이스 [Hz, 박자] — 총 16박자
  const BAS = [
    [196,1],[165,1],[175,1],[196,1],
    [196,1],[165,1],[175,1],[196,1],
    [147,1],[165,1],[175,1],[196,1],
    [165,2],[131,2],
  ]  // 합계: 16박자

  let active=false, muted=false, loopTimer=null

  function note(freq, t, dur, vol, type='square') {
    if (!freq || muted) return
    const o=_ac.createOscillator(), g=_ac.createGain()
    o.connect(g); g.connect(_ac.destination)
    o.type=type; o.frequency.value=freq
    g.gain.setValueAtTime(vol, t)
    g.gain.exponentialRampToValueAtTime(0.001, t+dur*0.85)
    o.start(t); o.stop(t+dur)
  }

  function scheduleLoop(startTime) {
    if (!active) return
    let mt=startTime
    MEL.forEach(([f,b])=>{ note(f, mt, b*B*0.85, 0.09); mt+=b*B })
    let bt=startTime
    BAS.forEach(([f,b])=>{ note(f, bt, b*B*0.55, 0.06,'triangle'); bt+=b*B })
    loopTimer = setTimeout(()=>scheduleLoop(startTime+(mt-startTime)), (mt-startTime-0.3)*1000)
  }

  return {
    start()  { if(active)return; active=true; _ac.resume().then(()=>scheduleLoop(_ac.currentTime+0.1)) },
    stop()   { active=false; clearTimeout(loopTimer) },
    toggle() { muted=!muted; return muted },
    isMuted(){ return muted },
  }
})()

// 뮤트 버튼 + M키
const muteBtn = document.getElementById('muteBtn')
function toggleMute() {
  const muted = BGM.toggle()
  muteBtn.textContent = muted ? 'SOUND OFF' : 'SOUND ON'
  muteBtn.classList.toggle('muted', muted)
}
muteBtn.addEventListener('click', toggleMute)
window.addEventListener('keydown', e => { if (e.key==='m'||e.key==='M') toggleMute() })

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let playerNick    = ''   // 게임오버 후 입력, 매 게임마다 초기화
let leaderboard   = []
let lbLoaded      = false
let scoreSubmitted = false

let state         = 'start'
let score         = 0
let lives         = 3
let wave          = 1
let enemies       = []
let particles     = []
let flashes       = []
let scorePopups   = []
let muzzleFlashes = []
let bulletTrails  = []
let shockwaves    = []
let shakeAmount   = 0, shakeX = 0, shakeY = 0
let crosshair     = { x:-200, y:-200, visible:false }
let crosshair2    = { x:-200, y:-200, visible:false }
let faceVisible   = false
let face2Visible  = false
let isBlinking    = false
let blinkPower    = 0    // 0=none 1=weak(윙크) 2=strong(양쪽)
let blinkStart    = 0
let blinkType     = 0    // 발사 타입 기록용
let blinkPower2   = 0
let blinkStart2   = 0
let blinkType2    = 0
let canShoot      = true
let flashScreen   = 0
let comboCount    = 0
let comboTimer    = 0
const COMBO_WINDOW = 2.2
let waveDelay     = 0
let spawnTimer    = 0
let spawned       = 0
let waveSize      = 6
let spawnGap      = 1.8
let gameStartCooldown = 0
let gameOverCooldown  = 0   // 게임오버 직후 깜빡임 차단

const ETYPES = ['slime','bat','skeleton']
const EHP    = { slime:1, bat:1, skeleton:3 }
const ESCORE = { slime:10, bat:15, skeleton:30 }
const ESPEED = { slime:75, bat:130, skeleton:55 }
const ECOLOR = { slime:'#4caf50', bat:'#9c27b0', skeleton:'#eceff1' }

function waveConfig(w) {
  waveSize = 5 + w*2; spawnGap = Math.max(0.7, 1.8 - w*0.08)
}
function spawnEnemy() {
  const type = ETYPES[Math.floor(Math.random()*ETYPES.length)]
  const margin = 60
  enemies.push({
    type, x: canvas.width+30, y: margin+Math.random()*(canvas.height-margin*2),
    hp: EHP[type]+Math.floor(wave/4), maxHp: EHP[type]+Math.floor(wave/4),
    speed: ESPEED[type]*(1+wave*0.12)*(0.85+Math.random()*0.3),
    wobble: Math.random()*Math.PI*2, hitFlash:0, animFrame:0, animTimer:0,
  })
}
function spawnParticles(x, y, color, count=14) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, spd = 60+Math.random()*140
    particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:1.2+Math.random()*1.2, sz:2+Math.random()*4, color})
  }
}

// ─── SHOOT ───────────────────────────────────────────────────────────────────
// power: 1=약한샷(윙크), 2=강한샷(양쪽눈)
function tryShoot(x, y, power = 1) {
  if (!canShoot || state !== 'playing') return
  canShoot = false

  const isStrong   = power >= 2
  const damage     = isStrong ? 2 : 1
  const flashSize  = isStrong ? 100 : 48
  const flashColor = isStrong ? '#ff8c00' : '#ffe57f'
  flashScreen      = isStrong ? 0.55 : 0.22

  if (isStrong) SFX.shootStrong(); else SFX.shootWeak()
  muzzleFlashes.push({x, y, life:1, size:flashSize, strong:isStrong})
  if (isStrong) {
    muzzleFlashes.push({x, y, life:0.7, size:flashSize*1.4, strong:true})
  }

  let hit=false, hitX=0, hitY=y
  for (let i=enemies.length-1; i>=0; i--) {
    const e=enemies[i], sw=SP[e.type].w*SC, sh=SP[e.type].h*SC
    const ex=e.x-sw/2, ey=e.y-sh/2
    if (x>=ex-8 && x<=ex+sw+8 && y>=ey-8 && y<=ey+sh+8) {
      e.hp -= damage; e.hitFlash=0.4; hitX=e.x; hitY=e.y
      if (e.hp<=0) {
        const combo = comboCount >= 2 ? comboCount : 1
        const pts   = ESCORE[e.type] * wave * combo
        score += pts
        comboCount++; comboTimer = COMBO_WINDOW
        if (comboCount >= 3) SFX.combo(Math.min(comboCount, 8)); else SFX.kill()
        spawnParticles(e.x, e.y, ECOLOR[e.type], isStrong ? 32 : 18)
        shockwaves.push({x:e.x,y:e.y,r:0,life:1,     color:ECOLOR[e.type]})
        shockwaves.push({x:e.x,y:e.y,r:0,life:0.7,   color:'#fff'})
        if (isStrong) shockwaves.push({x:e.x,y:e.y,r:0,life:0.5,color:flashColor})
        const label = combo>=2 ? `+${pts} x${combo}!` : `+${pts}`
        scorePopups.push({x:e.x,y:e.y-10,text:label,life:1,combo:combo>=2})
        enemies.splice(i,1); shakeAmount = isStrong ? 14 : 7
      } else { shakeAmount = isStrong ? 7 : 4; SFX.hit() }
      hit=true; break
    }
  }
  bulletTrails.push({x1:x,y1:y,x2:hit?hitX:0,y2:hitY,life:1,strong:isStrong})
  if (!hit) { shakeAmount=isStrong?4:2 }
  setTimeout(() => { canShoot=true }, isStrong ? 400 : 250)
}

// ─── GAME LOGIC ──────────────────────────────────────────────────────────────
function startGame() {
  SFX.gameStart()
  BGM.start()
  playerNick=''   // 매 게임마다 닉네임 초기화
  score=0; lives=3; wave=1
  enemies=[]; particles=[]; flashes=[]; scorePopups=[]
  muzzleFlashes=[]; bulletTrails=[]; shockwaves=[]
  spawned=0; spawnTimer=0; waveDelay=0
  comboCount=0; comboTimer=0
  waveConfig(wave); gameStartCooldown=1.5
  scoreSubmitted=false; state='playing'
}
function nextWave() {
  SFX.waveClear()
  wave++; waveConfig(wave); spawned=0; spawnTimer=0; waveDelay=3; state='waveclear'
}
function loseLife() {
  lives--; flashScreen=0.5
  if (lives<=0) {
    SFX.gameOver()
    BGM.stop()
    state='gameover'
    gameOverCooldown = 3.0   // 3초간 깜빡임 차단
    fetchLeaderboard().then(lb => {
      leaderboard=lb
      setTimeout(showScoreOverlay, 3000)   // 3초 후 닉네임 화면 표시
    })
  } else {
    SFX.loseLife()
  }
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  frameTime += dt
  gameStartCooldown = Math.max(0, gameStartCooldown-dt)
  gameOverCooldown  = Math.max(0, gameOverCooldown-dt)
  updateStars(dt)
  if (state==='playing') {
    spawnTimer -= dt
    if (spawnTimer<=0 && spawned<waveSize) { spawnEnemy(); spawned++; spawnTimer=spawnGap }
    for (let i=enemies.length-1; i>=0; i--) {
      const e=enemies[i]
      e.wobble += dt*(e.type==='bat'?5:2.5); e.x-=e.speed*dt
      e.hitFlash=Math.max(0,e.hitFlash-dt*4)
      e.animTimer+=dt; if(e.animTimer>0.4){e.animTimer=0;e.animFrame++}
      if (e.x<-60) { enemies.splice(i,1); loseLife() }
    }
    if (spawned>=waveSize && enemies.length===0) nextWave()
  }
  if (state==='waveclear') { waveDelay-=dt; if(waveDelay<=0) state='playing' }
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.life-=p.decay*dt
    if(p.life<=0) particles.splice(i,1)
  }
  for (let i=flashes.length-1;i>=0;i--) {
    const f=flashes[i]; f.r+=200*dt; f.a-=2.5*dt; if(f.a<=0) flashes.splice(i,1)
  }
  for (let i=scorePopups.length-1;i>=0;i--) {
    const p=scorePopups[i]; p.y-=40*dt; p.life-=2*dt; if(p.life<=0) scorePopups.splice(i,1)
  }
  flashScreen=Math.max(0,flashScreen-dt*4)
  shakeAmount=Math.max(0,shakeAmount-dt*40)
  if (comboCount>0) { comboTimer-=dt; if(comboTimer<=0) comboCount=0 }
  shakeX = shakeAmount>0.5?(Math.random()-0.5)*shakeAmount:0
  shakeY = shakeAmount>0.5?(Math.random()-0.5)*shakeAmount:0
  for (let i=muzzleFlashes.length-1;i>=0;i--) { muzzleFlashes[i].life-=dt*5; if(muzzleFlashes[i].life<=0) muzzleFlashes.splice(i,1) }
  for (let i=bulletTrails.length-1;i>=0;i--) { bulletTrails[i].life-=dt*5;   if(bulletTrails[i].life<=0) bulletTrails.splice(i,1) }
  for (let i=shockwaves.length-1;i>=0;i--) {
    shockwaves[i].r+=280*dt; shockwaves[i].life-=dt*2.5; if(shockwaves[i].life<=0) shockwaves.splice(i,1)
  }
}
let frameTime = 0

// ─── DRAW EFFECTS ────────────────────────────────────────────────────────────
function drawEnemies() {
  for (const e of enemies) {
    const sw=SP[e.type].w*SC, sh=SP[e.type].h*SC
    const wy=e.type==='bat'?Math.sin(e.wobble)*8:Math.sin(e.wobble)*2
    const x=Math.floor(e.x-sw/2), y=Math.floor(e.y-sh/2+wy)
    drawSprite(e.type,x,y,e.animFrame,e.hitFlash>0?'#ffffff':null)
    if (e.maxHp>1) {
      ctx.fillStyle='#222'; ctx.fillRect(x,y-8,sw,4)
      const r=e.hp/e.maxHp
      ctx.fillStyle=r>0.5?'#4caf50':r>0.25?'#ffeb3b':'#f44336'
      ctx.fillRect(x,y-8,Math.floor(sw*r),4)
    }
  }
}
function drawParticles() {
  for (const p of particles) { ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.sz),Math.ceil(p.sz)) }
  ctx.globalAlpha=1
}
function drawFlashes() {
  for (const f of flashes) { ctx.globalAlpha=Math.max(0,f.a); ctx.strokeStyle=f.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.stroke() }
  ctx.globalAlpha=1
}
function drawScorePopups() {
  for (const p of scorePopups) {
    ctx.globalAlpha=Math.max(0,p.life)
    drawText(p.text,Math.floor(p.x),Math.floor(p.y),p.combo?'#ff9800':'#ffeb3b',p.combo?4:3)
  }
  ctx.globalAlpha=1
}
function drawMuzzleFlashes() {
  for (const f of muzzleFlashes) {
    const a=Math.max(0,f.life), sz=f.size*(1.8-f.life*0.8)
    const grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,sz)
    grad.addColorStop(0,`rgba(255,255,255,${a})`); grad.addColorStop(0.25,`rgba(255,230,100,${a*0.9})`)
    grad.addColorStop(0.6,`rgba(255,150,30,${a*0.5})`); grad.addColorStop(1,`rgba(255,80,0,0)`)
    ctx.globalAlpha=1; ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(f.x,f.y,sz,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha=a*0.9; ctx.strokeStyle='#ffe57f'; ctx.lineWidth=Math.max(1,3*a)
    for (let r=0;r<8;r++) {
      const angle=(r/8)*Math.PI*2, len=sz*(1.4+(r%2)*0.4)
      ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(f.x+Math.cos(angle)*len,f.y+Math.sin(angle)*len); ctx.stroke()
    }
  }
  ctx.globalAlpha=1
}
function drawBulletTrails() {
  for (const t of bulletTrails) {
    const a=Math.max(0,t.life)
    if (t.strong) {
      ctx.globalAlpha=a*0.6; ctx.strokeStyle='#ff8c00'; ctx.lineWidth=9*a; ctx.lineCap='round'
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
      ctx.globalAlpha=a; ctx.strokeStyle='#fff'; ctx.lineWidth=3*a
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
    } else {
      ctx.globalAlpha=a*0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=4*a; ctx.lineCap='round'
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
      ctx.globalAlpha=a*0.8; ctx.strokeStyle='#ffe57f'; ctx.lineWidth=1.5*a
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
    }
  }
  ctx.globalAlpha=1; ctx.lineCap='butt'
}
function drawShockwaves() {
  for (const s of shockwaves) {
    ctx.globalAlpha=Math.max(0,s.life*0.7); ctx.strokeStyle=s.color; ctx.lineWidth=Math.max(1,4*s.life)
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.stroke()
  }
  ctx.globalAlpha=1
}
function drawHUD() {
  const pad=14, sz=3
  drawText(`SCORE:${score}`, pad, pad, '#fff', sz)
  const wt=`WAVE ${wave}`
  drawText(wt, canvas.width/2-textW(wt,sz)/2, pad, '#ffeb3b', sz)
  for (let i=0;i<3;i++) {
    const hx=canvas.width-pad-(3-i)*(SP.heart.w*SC+6)
    drawSprite('heart',hx,pad,0,i<lives?null:'#1a1a2e')
  }
  // 콤보 표시
  if (comboCount>=2) {
    const ct=`x${comboCount} COMBO!`, cs=3
    const pulse=0.7+0.3*Math.sin(Date.now()/120)
    ctx.globalAlpha=pulse
    drawText(ct, canvas.width/2-textW(ct,cs)/2, canvas.height-52, '#ffeb3b', cs)
    ctx.globalAlpha=1
    // 콤보 타이머 바
    const bw=120, bh=4
    const bx=canvas.width/2-bw/2, by=canvas.height-28
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh)
    const ratio=comboTimer/COMBO_WINDOW
    const barColor=ratio>0.5?'#ffeb3b':ratio>0.25?'#ff9800':'#f44336'
    ctx.fillStyle=barColor; ctx.fillRect(bx,by,Math.floor(bw*ratio),bh)
  }
}
function drawCrosshair(ch, power, p2=false) {
  const {x,y}=ch, size=18, gap=5
  const strong = power>=2 && gameStartCooldown<=0
  const weak   = power===1 && gameStartCooldown<=0
  // P1: 초록/노랑/주황  P2: 하늘/분홍/빨강
  const baseColor  = p2 ? '#00e5ff' : '#00ff88'
  const weakColor  = p2 ? '#ff6ec7' : '#ffeb3b'
  const strongColor= p2 ? '#ff1744' : '#ff8c00'
  const color = strong ? strongColor : weak ? weakColor : baseColor
  ctx.fillStyle=color
  ctx.fillRect(x-size-gap,y-1,size,2); ctx.fillRect(x+gap+1,y-1,size,2)
  ctx.fillRect(x-1,y-size-gap,2,size); ctx.fillRect(x-1,y+gap+1,2,size)
  ctx.fillRect(x-2,y-2,4,4)
  // 플레이어 라벨
  const label = p2 ? 'P2' : 'P1'
  ctx.font = '700 9px "Courier New"'; ctx.textAlign='center'
  ctx.fillStyle = color; ctx.fillText(label, x, y-size-gap-4)
  if (strong) {
    ctx.globalAlpha=0.30; ctx.fillStyle=strongColor
    ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha=0.15; ctx.beginPath(); ctx.arc(x,y,60,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha=1
  } else if (weak) {
    ctx.globalAlpha=0.20; ctx.fillStyle=weakColor
    ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1
  }
}
function drawWaveBanner() {
  const msg=`WAVE  ${wave}  CLEAR!`, sz=5
  const x=canvas.width/2-textW(msg,sz)/2, y=canvas.height/2-sz*5/2
  const alpha=Math.min(1,waveDelay)*(waveDelay<1?waveDelay:1)
  ctx.globalAlpha=alpha
  drawText(msg,x+2,y+2,'#000',sz); drawText(msg,x,y,'#ffeb3b',sz)
  ctx.globalAlpha=1
  const sub='GET READY!', ss=2
  ctx.globalAlpha=alpha*(0.5+0.5*Math.sin(Date.now()/300))
  drawText(sub,canvas.width/2-textW(sub,ss)/2,y+sz*7,'#00ff88',ss)
  ctx.globalAlpha=1
}

// ─── LEADERBOARD DRAW ────────────────────────────────────────────────────────
// ctx.fillText 사용 — 한글 포함 모든 닉네임 표시 가능
function drawLeaderboard(cx, startY, highlightNick, maxRows=8) {
  const rowH=18, font='13px "Courier New", monospace'
  ctx.font = '700 11px "Courier New", monospace'
  ctx.textAlign = 'center'
  ctx.fillStyle = '#ffeb3b'
  ctx.fillText('# RANKING', cx, startY+10)

  if (leaderboard.length===0) {
    ctx.globalAlpha=0.4; ctx.fillStyle='#888'
    ctx.font = font
    ctx.fillText('NO DATA YET', cx, startY+28)
    ctx.globalAlpha=1; ctx.textAlign='left'; return
  }

  ctx.font = font
  leaderboard.slice(0, maxRows).forEach((entry, i) => {
    const y = startY + 26 + i * rowH
    const isMe = highlightNick && entry.nick.toLowerCase() === highlightNick.toLowerCase()
    const color = isMe ? '#00ff88' : (i===0?'#ffd700': i===1?'#c0c0c0': i===2?'#cd7f32':'#888')

    if (isMe) {
      ctx.fillStyle = 'rgba(0,255,136,0.10)'
      ctx.fillRect(cx-130, y-13, 260, rowH)
    }

    ctx.fillStyle = color
    // 순위 (왼쪽 고정)
    ctx.textAlign = 'right'
    ctx.fillText(`${i+1}.`, cx-98, y)
    // 닉네임 (중앙 왼쪽)
    ctx.textAlign = 'left'
    const displayNick = entry.nick.length > 10 ? entry.nick.slice(0,10)+'…' : entry.nick
    ctx.fillText(displayNick, cx-90, y)
    // 점수 (오른쪽 고정)
    ctx.textAlign = 'right'
    ctx.fillText(entry.score.toLocaleString(), cx+130, y)
  })
  ctx.textAlign = 'left'
}

// ─── START SCREEN ────────────────────────────────────────────────────────────
function drawStartScreen() {
  const cx=canvas.width/2, cy=canvas.height/2

  const title='BLINK FIRE', ts=6
  drawText(title, cx-textW(title,ts)/2+3, cy-120+3, '#000', ts)
  drawText(title, cx-textW(title,ts)/2, cy-120, '#ffeb3b', ts)

  const lines=[
    {t:'고개를 움직여 조준',   c:'#aaa',s:2},
    {t:'MOVE YOUR HEAD TO AIM',c:'#555',s:2},
    {t:'',c:'',s:2},
    {t:'눈 깜빡이면 발사',    c:'#aaa',s:2},
    {t:'BLINK TO SHOOT',      c:'#555',s:2},
  ]
  lines.forEach((l,i)=>{ if(!l.t)return; drawText(l.t,cx-textW(l.t,l.s)/2,cy-30+i*18,l.c,l.s) })

  const st='BLINK LONG TO START', ss=3
  ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()/500)
  drawText(st,cx-textW(st,ss)/2,cy+70,'#00ff88',ss)
  ctx.globalAlpha=1

  // 2P 감지 표시
  if (face2Visible) {
    const p2t='2P DETECTED!', p2s=2
    ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()/300)
    drawText(p2t,cx-textW(p2t,p2s)/2,cy+98,'#00e5ff',p2s)
    ctx.globalAlpha=1
  }

  // Sprites
  drawSprite('slime',   cx-80,cy+100)
  drawSprite('bat',     cx-20,cy+105)
  drawSprite('skeleton',cx+40,cy+100)

  // Leaderboard
  drawLeaderboard(cx, cy+145, playerNick, 5)
}

// ─── GAME OVER SCREEN ────────────────────────────────────────────────────────
function drawGameOver() {
  const cx=canvas.width/2, cy=canvas.height/2

  const go='GAME OVER', gs=6
  drawText(go, cx-textW(go,gs)/2+3, cy-100+3, '#000', gs)
  drawText(go, cx-textW(go,gs)/2,   cy-100,   '#f44336', gs)

  // Score
  const sc=`SCORE : ${score}`, ss=3
  drawText(sc, cx-textW(sc,ss)/2, cy-30, '#fff', ss)
  const wt=`WAVE : ${wave}`
  drawText(wt, cx-textW(wt,ss)/2, cy,    '#ffeb3b', ss)

  // Rank highlight
  if (playerNick) {
    const rank=leaderboard.findIndex(e=>e.nick.toUpperCase()===playerNick.toUpperCase())
    if (rank>=0) {
      const rt=`YOUR RANK : #${rank+1}`, rs=2
      drawText(rt, cx-textW(rt,rs)/2, cy+24, '#00ff88', rs)
    }
  }

  // Leaderboard
  drawLeaderboard(cx, cy+42, playerNick)

  // Retry — 오버레이가 닫힌 후에만 표시
  const lbBot = cy+42 + 26 + Math.min(8, leaderboard.length)*18 + 10
  if (document.getElementById('scoreOverlay').classList.contains('hidden')) {
    const rtt='BLINK LONG TO RETRY', rs2=2
    ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()/500)
    drawText(rtt, cx-textW(rtt,rs2)/2, lbBot+8, '#00ff88', rs2)
    ctx.globalAlpha=1
  }

}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle='#06060f'; ctx.fillRect(0,0,canvas.width,canvas.height)
  drawStars()
  if      (state==='start')    drawStartScreen()
  else if (state==='gameover') drawGameOver()
  else {
    ctx.save(); ctx.translate(shakeX,shakeY)
    drawBulletTrails(); drawEnemies(); drawShockwaves()
    drawParticles(); drawFlashes(); drawMuzzleFlashes(); drawScorePopups()
    ctx.restore()
    drawHUD(); if(state==='waveclear') drawWaveBanner()
  }
  if (flashScreen>0) { ctx.fillStyle=`rgba(255,200,100,${flashScreen})`; ctx.fillRect(0,0,canvas.width,canvas.height) }
  for (let y=0;y<canvas.height;y+=4) { ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.fillRect(0,y,canvas.width,2) }
  if (crosshair.visible)  drawCrosshair(crosshair,  blinkPower,  false)
  if (crosshair2.visible) drawCrosshair(crosshair2, blinkPower2, true)
  if (!faceVisible && !face2Visible && (state==='playing'||state==='waveclear')) {
    const hint='SHOW YOUR FACE', sz=2
    ctx.globalAlpha=0.4+0.4*Math.sin(Date.now()/500)
    drawText(hint,canvas.width/2-textW(hint,sz)/2,canvas.height-52,'#888',sz)
    ctx.globalAlpha=1
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let lastTime=0
function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts
  update(dt); draw(); requestAnimationFrame(loop)
}
requestAnimationFrame(loop)

// ─── SCORE OVERLAY (게임오버 후 닉네임 입력 + 랭킹 등록) ─────────────────────
const scoreOverlay  = document.getElementById('scoreOverlay')
const nickSection   = document.getElementById('nickSection')
const retrySection  = document.getElementById('retrySection')
const nickInput     = document.getElementById('nickInput')
const submitBtn     = document.getElementById('submitBtn')
const skipBtn       = document.getElementById('skipBtn')
const retryBtn      = document.getElementById('retryBtn')
const quitBtn       = document.getElementById('quitBtn')

function renderLbPreview() {
  const rows = document.getElementById('lbRows')
  if (!leaderboard.length) { rows.textContent = '아직 기록이 없어요'; return }
  rows.innerHTML = leaderboard.slice(0, 5).map((e, i) => {
    const rank  = `${i+1}.`.padEnd(3, '\u00A0')
    const nick  = e.nick.slice(0, 8).padEnd(8, '\u00A0')
    const sc    = String(e.score).padStart(6, '\u00A0')
    const isMe  = playerNick && e.nick.toUpperCase() === playerNick.toUpperCase()
    return `<div class="${isMe ? 'lb-me' : ''}">${rank}${nick} ${sc}</div>`
  }).join('')
}

function showScoreOverlay() {
  document.getElementById('finalScore').textContent = score
  document.getElementById('finalWave').textContent  = wave
  nickSection.classList.remove('hidden')
  retrySection.classList.add('hidden')
  nickInput.value = ''
  renderLbPreview()
  scoreOverlay.classList.remove('hidden')
  setTimeout(() => nickInput.focus(), 100)
}

function showRetrySection(msg) {
  document.getElementById('retryScore').textContent = score
  document.getElementById('retryWave').textContent  = wave
  document.getElementById('retryMsg').textContent   = msg
  nickSection.classList.add('hidden')
  retrySection.classList.remove('hidden')
}

function hideScoreOverlay() {
  scoreOverlay.classList.add('hidden')
}

async function doSubmit() {
  const n = nickInput.value.trim()
  if (!n) { nickInput.focus(); return }
  playerNick = n
  submitBtn.textContent = '등록 중...'
  submitBtn.disabled = true
  await submitScore(playerNick, score)
  leaderboard = await fetchLeaderboard()
  scoreSubmitted = true
  submitBtn.textContent = '🏆 랭킹 등록'
  submitBtn.disabled = false
  showRetrySection('등록이 완료됐어요!')
}

submitBtn.addEventListener('click', doSubmit)
nickInput.addEventListener('keydown', e => { if (e.key==='Enter') doSubmit() })
skipBtn.addEventListener('click', () => {
  playerNick = ''
  showRetrySection('랭킹 등록을 건너뛰었어요')
})
retryBtn.addEventListener('click', () => { hideScoreOverlay(); startGame() })
quitBtn.addEventListener('click',  () => { hideScoreOverlay() })

canvas.addEventListener('click', e => {
  if (scoreOverlay.classList.contains('hidden') && !faceVisible) {
    if (state==='playing') tryShoot(e.clientX, e.clientY)
    else if (state==='start') startGame()
    else if (state==='gameover') startGame()
  }
})
canvas.addEventListener('mousemove', e => {
  if (!faceVisible) { crosshair.x=e.clientX; crosshair.y=e.clientY; crosshair.visible=true }
})
canvas.addEventListener('mouseleave', () => { if(!faceVisible) crosshair.visible=false })
// 터치 이벤트 (모바일)
canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  const t = e.touches[0]
  if (!faceVisible) {
    if (state==='playing') tryShoot(t.clientX, t.clientY)
    else if (state==='start') startGame()
    else if (state==='gameover') startGame()
  }
}, { passive:false })

// ─── MEDIAPIPE FACE MESH ──────────────────────────────────────────────────────
function eyeAR(lm,top,bot,outer,inner) {
  const h=Math.hypot(lm[top].x-lm[bot].x,lm[top].y-lm[bot].y)
  const w=Math.hypot(lm[outer].x-lm[inner].x,lm[outer].y-lm[inner].y)
  return w>0?h/w:1
}

const BLINK_THRESH = 0.18
const HEAD_SENS_X  = 2.2
const HEAD_SENS_Y  = 2.0

const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
})
faceMesh.setOptions({ maxNumFaces:2, refineLandmarks:true, minDetectionConfidence:0.6, minTrackingConfidence:0.5 })

function processFace(lm, ch, getBlinkPower, setBlinkPower, getBlinkStart, setBlinkStart, getBlinkType, setBlinkType) {
  // 조준: 코끝 고개 방향 + 적응형 스무딩
  const rawX=((1-lm[1].x)-0.5)*canvas.width*HEAD_SENS_X + canvas.width/2
  const rawY=(lm[1].y-0.4)*canvas.height*HEAD_SENS_Y + canvas.height/2
  if (!ch.visible) { ch.x=rawX; ch.y=rawY }
  else {
    const dist=Math.hypot(rawX-ch.x, rawY-ch.y)
    const smooth=Math.min(0.85, 0.2+dist/120)
    ch.x=smooth*rawX+(1-smooth)*ch.x
    ch.y=smooth*rawY+(1-smooth)*ch.y
  }
  ch.visible=true

  // 눈 깜빡임 감지
  const earL=eyeAR(lm,159,145,33,133), earR=eyeAR(lm,386,374,362,263)
  const leftClosed=earL<BLINK_THRESH, rightClosed=earR<BLINK_THRESH
  const bothClosed=leftClosed&&rightClosed
  const oneClosed=(leftClosed||rightClosed)&&!bothClosed
  const nowBlink=leftClosed||rightClosed
  const power=bothClosed?2:oneClosed?1:0
  setBlinkPower(power)

  const bs=getBlinkStart()
  if (nowBlink && bs===0) { setBlinkStart(Date.now()); setBlinkType(bothClosed?2:1) }
  if (!nowBlink && bs>0) {
    const dur=Date.now()-bs; setBlinkStart(0)
    if (dur>60&&dur<450&&gameStartCooldown<=0&&state==='playing') tryShoot(ch.x,ch.y,getBlinkType())
    else if (dur>=800 && gameOverCooldown<=0 && (state==='start'||state==='gameover') && scoreOverlay.classList.contains('hidden')) startGame()
    setBlinkType(0)
  }
}

faceMesh.onResults(results => {
  const faces = results.multiFaceLandmarks || []

  // P1
  if (faces.length >= 1) {
    faceVisible = true
    processFace(faces[0], crosshair,
      ()=>blinkPower,  v=>{ blinkPower=v },
      ()=>blinkStart,  v=>{ blinkStart=v },
      ()=>blinkType,   v=>{ blinkType=v })
  } else {
    faceVisible=false; crosshair.visible=false; blinkPower=0
  }

  // P2
  if (faces.length >= 2) {
    face2Visible = true
    processFace(faces[1], crosshair2,
      ()=>blinkPower2, v=>{ blinkPower2=v },
      ()=>blinkStart2, v=>{ blinkStart2=v },
      ()=>blinkType2,  v=>{ blinkType2=v })
  } else {
    face2Visible=false; crosshair2.visible=false; blinkPower2=0
  }
})

// ─── CAMERA ──────────────────────────────────────────────────────────────────
const camGuide   = document.getElementById('camGuide')
let cameraActive = false

function startCamera() {
  const _alert = window.alert
  window.alert = () => {}   // MediaPipe 내부 alert() 차단

  camCv.width = 200; camCv.height = 150   // 한 번만 설정 (매 프레임 설정 시 캔버스 지워짐)

  const cam = new Camera(video, {
    onFrame: async () => {
      camCtx.drawImage(video, 0, 0, camCv.width, camCv.height)
      await faceMesh.send({ image: video })
    },
    width: 640, height: 480,
  })

  cam.start()
    .then(() => {
      window.alert = _alert
      cameraActive = true
      loading.classList.add('hidden')
      fetchLeaderboard().then(lb => { leaderboard=lb; lbLoaded=true })
    })
    .catch(() => {
      window.alert = _alert
      cameraActive = false
      // 주소창 안내 메시지 표시 → 5초 후 게임으로 진입
      loading.querySelector('.px-sub').textContent  = '카메라가 차단돼 있어요'
      loading.querySelector('.px-hint').textContent = '아래 안내를 따라주세요'
      camGuide.style.display = 'block'
      fetchLeaderboard().then(lb => { leaderboard=lb })
      setTimeout(() => loading.classList.add('hidden'), 5000)
    })
}

startCamera()
</script>
