<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BLINK FIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --px: 'Press Start 2P', 'Courier New', monospace;
      --ko: 'Courier New', monospace;
      --bg: #06060f; --dark: #0a0a1a; --yellow: #ffeb3b;
      --green: #00ff88; --red: #f44336; --dim: #1a1a2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    #gameCanvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    #video { position: absolute; visibility: hidden; width: 0; height: 0; }
    #camCanvas {
      position: fixed; bottom: 12px; right: 12px;
      width: min(160px, 22vw); height: min(120px, 16.5vw);
      border: 2px solid #2a2a3a; border-radius: 0;
      transform: scaleX(-1); opacity: 0.35;
      image-rendering: pixelated;
    }

    /* ── 스캔라인 믹스인 (CRT 효과) ── */
    .scanlines {
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }

    /* ── 로딩 화면 ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 22px; z-index: 30;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }
    #loading.hidden { display: none; }
    #loading .px-logo {
      font-family: var(--px); font-size: clamp(14px,4vw,22px);
      color: var(--yellow); letter-spacing: 8px;
      text-shadow: 3px 3px 0 #000, 0 0 30px rgba(255,235,59,0.25);
    }
    #loading .px-sub  { font-family: var(--ko); font-size: 12px; color: #444; letter-spacing: 1px; }
    #loading .px-hint { font-family: var(--ko); font-size: 12px; color: #666;
                        animation: px-blink 1s steps(1) infinite; }
    #loading .px-hint::before { content: '▶  '; color: var(--green); }

    /* ── 모바일 안내 화면 ── */
    #mobileBlock {
      display: none;
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; padding: 32px;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      text-align: center;
    }
    #mobileBlock .mb-title {
      font-family: var(--px); font-size: clamp(13px,4vw,20px);
      color: var(--yellow); letter-spacing: 4px;
      text-shadow: 3px 3px 0 #000, 0 0 30px rgba(255,235,59,0.25);
    }
    #mobileBlock .mb-icon { font-size: 48px; line-height: 1; }
    #mobileBlock .mb-msg {
      font-family: var(--ko); font-size: 13px; color: #aaa;
      line-height: 2; max-width: 320px;
    }
    #mobileBlock .mb-url {
      font-family: var(--ko); font-size: 12px; color: var(--green);
      background: #0a1a12; border: 1px solid #1a4a2a;
      padding: 10px 18px; letter-spacing: 1px;
    }

    /* ── 픽셀 윈도우 오버레이 ── */
    #scoreOverlay {
      position: fixed; inset: 0; background: rgba(6,6,15,0.93);
      display: flex; align-items: center; justify-content: center; z-index: 20;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
      );
    }
    #scoreOverlay.hidden { display: none; }

    .score-box {
      width: min(380px, 90vw);
      background: var(--dark);
      border: 3px solid var(--yellow);
      border-radius: 0;
      box-shadow: 5px 5px 0 #000, 8px 8px 0 rgba(255,235,59,0.1);
      overflow: hidden;
    }

    /* 타이틀바 */
    .px-titlebar {
      background: var(--yellow); color: #000;
      font-family: var(--px); font-size: 9px;
      padding: 9px 14px; letter-spacing: 3px;
      text-align: center;
      border-bottom: 2px solid #000;
    }

    /* 내용 영역 */
    .px-body {
      padding: 18px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    .go-nums {
      font-family: var(--px); font-size: 9px; color: #fff;
      text-align: center; line-height: 2.5;
    }
    .go-nums span { color: var(--yellow); }

    .go-desc {
      font-family: var(--ko); font-size: 11px; color: #999;
      text-align: center; line-height: 1.9;
      border-top: 1px solid var(--dim); padding-top: 10px; width: 100%;
    }

    /* 랭킹 미리보기 */
    #lbPreview {
      width: 100%; background: #050510;
      border: 1px solid var(--dim);
      padding: 10px 12px;
    }
    #lbPreview .lb-title {
      font-family: var(--px); font-size: 7px;
      color: var(--yellow); letter-spacing: 3px; margin-bottom: 7px;
      text-align: center;
    }
    #lbPreview .lb-cols  { display: flex; gap: 8px; }
    #lbPreview .lb-col   { flex: 1; min-width: 0; }
    #lbPreview .lb-rows  { font-family: var(--ko); font-size: 11px; line-height: 1.85; color: #bbb; }
    #lbPreview .lb-row   { display: flex; justify-content: space-between; gap: 4px; }
    #lbPreview .lb-row .lb-rank { color: #666; flex-shrink: 0; }
    #lbPreview .lb-row .lb-nick { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #lbPreview .lb-row .lb-sc   { flex-shrink: 0; text-align: right; }
    #lbPreview .lb-me    { color: var(--green) !important; }

    /* 입력창 */
    #nickInput {
      background: #050510; border: 2px solid #2a2a3a; border-radius: 0;
      color: var(--yellow); font-family: var(--ko);
      font-size: clamp(13px, 3.5vw, 15px);
      padding: 10px 14px; text-align: center; width: 100%;
      outline: none; letter-spacing: 2px; caret-color: var(--yellow);
    }
    #nickInput:focus { border-color: var(--yellow); }
    #nickInput::placeholder { color: #666; font-size: 11px; letter-spacing: 1px; }

    /* 버튼 — 프라이머리 */
    .px-btn {
      background: var(--yellow); border: none; border-radius: 0; color: #000;
      cursor: pointer; font-family: var(--px);
      font-size: clamp(7px, 2vw, 9px);
      padding: 13px 8px; width: 100%; letter-spacing: 2px;
      box-shadow: 3px 3px 0 #000;
      transition: transform .06s, box-shadow .06s;
    }
    .px-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }

    /* 버튼 — 고스트 */
    .px-btn-ghost {
      background: none; border: 1px solid #444; border-radius: 0;
      color: #aaa; cursor: pointer; font-family: var(--ko);
      font-size: 11px; padding: 8px; width: 100%; letter-spacing: 1px;
    }
    .px-btn-ghost:hover { color: #fff; border-color: #888; }

    /* 섹션 show/hide */
    #nickForm { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    #nickForm.hidden { display: none; }
    #doneMsg.hidden  { display: none; }

    .retry-msg   { font-family: var(--ko); font-size: 12px; color: var(--green); text-align: center; }
    .retry-score { font-family: var(--px); font-size: 8px; color: #888; text-align: center; line-height: 2.5; }
    .retry-score span { color: var(--yellow); }

    /* ── 카메라 안내 메시지 ── */
    #camGuide {
      display: none;
      margin-top: 18px;
      text-align: center;
    }
    #camGuide .cg-arrow {
      font-family: var(--px); font-size: 7px; color: var(--yellow);
      letter-spacing: 1px; margin-bottom: 8px;
      animation: px-blink 1s step-start infinite;
    }
    #camGuide .cg-text {
      font-family: var(--ko); font-size: 12px; color: #aaa;
      line-height: 1.8;
    }
    #camGuide .cg-text em {
      font-style: normal; color: var(--yellow);
    }

    #muteBtn {
      position: fixed; bottom: 14px; left: 14px; z-index: 20;
      font-family: var(--px); font-size: 11px;
      background: #0a0a1a; border: 2px solid #00ff88; border-radius: 0;
      color: #00ff88; cursor: pointer; padding: 5px 10px; letter-spacing: 1px;
      box-shadow: 0 0 8px rgba(0,255,136,0.3);
      transition: color .1s, border-color .1s, box-shadow .1s;
    }
    @media (max-width: 600px) {
      #muteBtn { bottom: auto; top: 14px; left: auto; right: 14px; font-size: 9px; padding: 4px 8px; }
    }
    #muteBtn:hover { color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 8px rgba(255,235,59,0.4); }
    #muteBtn.muted { color: #444; border-color: #333; box-shadow: none; }

    @keyframes px-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>

<div id="loading">
  <div class="px-logo">BLINK  FIRE</div>
  <div class="px-sub">카메라 권한을 허용해주세요</div>
  <div class="px-hint">얼굴을 카메라에 보여주세요</div>
  <div id="camGuide">
    <div class="cg-arrow">▲ ▲ ▲</div>
    <div class="cg-text">
      주소창 오른쪽 <em>차단된 카메라 아이콘</em>을 클릭하고<br>
      <em>카메라 → 허용</em>으로 바꾼 뒤 새로고침 해주세요
    </div>
  </div>
</div>

<div id="scoreOverlay" class="hidden">
  <div class="score-box">
    <div class="px-titlebar">* GAME OVER *</div>
    <div class="px-body">
      <div class="go-nums">
        SCORE &nbsp;<span id="finalScore">0</span><br>
        WAVE &nbsp;&nbsp;<span id="finalWave">1</span>
      </div>
      <div id="lbPreview">
        <div class="lb-title">-- TOP 20 --</div>
        <div class="lb-cols">
          <div class="lb-col lb-rows" id="lbRowsA">로딩 중...</div>
          <div class="lb-col lb-rows" id="lbRowsB"></div>
        </div>
      </div>
      <!-- 닉네임 입력 (등록 전) -->
      <div id="nickForm">
        <div class="go-desc">닉네임을 입력하면 랭킹에 등록돼요</div>
        <input id="nickInput" type="text" placeholder="닉네임 입력 (최대 10자)"
               maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="submitBtn" class="px-btn">SUBMIT SCORE</button>
      </div>
      <!-- 등록 완료 메시지 (등록 후) -->

      <!-- PLAY AGAIN 항상 표시 -->
      <button id="retryBtn" class="px-btn">PLAY AGAIN</button>
    </div>
  </div>
</div>

<!-- 모바일 차단 안내 -->
<div id="mobileBlock">
  <div class="mb-icon">💻</div>
  <div class="mb-title">BLINK FIRE</div>
  <div class="mb-msg">이 게임은 카메라가 있는<br>PC 환경에서 즐길 수 있어요.<br><br>눈을 깜빡여서 총을 쏘는<br>얼굴 인식 슈팅 게임이에요!</div>
  <div class="mb-url">huijeong-im.github.io/blink-fire/</div>
</div>

<canvas id="gameCanvas"></canvas>
<video id="video" autoplay playsinline muted></video>
<canvas id="camCanvas" width="200" height="150"></canvas>
<button id="muteBtn">SOUND ON</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─── UPSTASH CONFIG ──────────────────────────────────────────────────────────
// 주의: 이 토큰은 클라이언트에 노출됩니다. 랭킹 전용 키 사용을 권장해요.
const UPSTASH_URL   = 'https://close-dane-70929.upstash.io'
const UPSTASH_TOKEN = 'gQAAAAAAARURAAIncDI0MWU4MTVhNTcxNTU0ZTM2OTM1OWUyZDYxOTU5YTFmYnAyNzA5Mjk'
const LB_KEY        = 'blinkfire:lb'

async function upstashGet(...args) {
  try {
    const path = args.map(a => encodeURIComponent(String(a))).join('/')
    const res  = await fetch(`${UPSTASH_URL}/${path}`, {
      headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }
    })
    const json = await res.json()
    return json.result
  } catch { return null }
}

async function submitScore(nick, sc) {
  // ZADD GT: 더 높은 점수만 업데이트
  await upstashGet('zadd', LB_KEY, 'gt', sc, nick)
}

async function fetchLeaderboard() {
  const raw = await upstashGet('zrevrange', LB_KEY, 0, 19, 'withscores')
  if (!Array.isArray(raw)) return []
  const entries = []
  for (let i = 0; i < raw.length; i += 2) {
    entries.push({ nick: raw[i], score: Number(raw[i + 1]) })
  }
  return entries
}

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas')
const ctx     = canvas.getContext('2d')
const video   = document.getElementById('video')
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1
const camCv   = document.getElementById('camCanvas')
const camCtx  = camCv.getContext('2d')
const loading = document.getElementById('loading')

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
resize()
window.addEventListener('resize', resize)

// ─── PIXEL FONT (5×5) ────────────────────────────────────────────────────────
const FONT = {
  '0':['111','101','101','101','111'],'1':['010','110','010','010','111'],
  '2':['111','001','111','100','111'],'3':['111','001','111','001','111'],
  '4':['101','101','111','001','001'],'5':['111','100','111','001','111'],
  '6':['111','100','111','101','111'],'7':['111','001','001','001','001'],
  '8':['111','101','111','101','111'],'9':['111','101','111','001','111'],
  'A':['111','101','111','101','101'],'B':['110','101','110','101','110'],
  'C':['111','100','100','100','111'],'D':['110','101','101','101','110'],
  'E':['111','100','111','100','111'],'F':['111','100','111','100','100'],
  'G':['111','100','101','101','111'],'H':['101','101','111','101','101'],
  'I':['111','010','010','010','111'],'K':['101','110','100','110','101'],
  'L':['100','100','100','100','111'],'M':['101','111','101','101','101'],
  'N':['101','111','111','101','101'],'O':['111','101','101','101','111'],
  'P':['111','101','111','100','100'],'R':['111','101','111','110','101'],
  'S':['111','100','111','001','111'],'T':['111','010','010','010','010'],
  'U':['101','101','101','101','111'],'V':['101','101','101','010','010'],
  'W':['101','101','101','111','101'],'X':['101','010','010','010','101'],
  'Y':['101','101','010','010','010'],'Z':['111','001','010','100','111'],
  ' ':['000','000','000','000','000'],':':['000','010','000','010','000'],
  '!':['010','010','010','000','010'],'-':['000','000','111','000','000'],
  '+':['000','010','111','010','000'],'/':['001','001','010','100','100'],
  '.':['000','000','000','000','010'],'#':['010','111','010','111','010'],
}
function drawText(text, x, y, color = '#fff', sz = 2) {
  text = String(text).toUpperCase(); let cx = x
  for (const ch of text) {
    const g = FONT[ch] || FONT[' ']
    g.forEach((row, ry) => [...row].forEach((px, rx) => {
      if (px === '1') { ctx.fillStyle = color; ctx.fillRect(Math.floor(cx+rx*sz), Math.floor(y+ry*sz), sz, sz) }
    }))
    cx += 4 * sz
  }
}
function textW(text, sz = 2) { return String(text).length * 4 * sz }

// ─── SPRITES ─────────────────────────────────────────────────────────────────
const SP = {
  slime: {
    frames: [
      ['..GGG...','.GGGGG..','GG.G.GGG','GGGGGGG.','GGGG.GGG','.GGGGG..','..GGG...','........'],
      ['..GGG...','.GGGGG..','GG.G.GGG','GGGGGGG.','GGG.GGGG','.GGGGG..','..GGG...','........'],
    ], c: { G:'#4caf50' }, w:8, h:8,
  },
  bat: {
    frames: [
      ['P..PP..P','PPPPPPPP','.PPPPPP.','..PPPP..','...PP...'],
      ['P..PP..P','.PPPPPP.','..PPPP..','...PP...','....P...'],
    ], c: { P:'#9c27b0' }, w:8, h:5,
  },
  skeleton: {
    frames: [
      ['.WWWWWW.','W.W..W.W','WWWWWWWW','.W.WW.W.','W.WWWW.W','.W.WW.W.','..W..W..','........'],
      ['.WWWWWW.','W.W..W.W','WWWWWWWW','.W.WW.W.','WW.WW.WW','.W.WW.W.','..W..W..','........'],
    ], c: { W:'#eceff1' }, w:8, h:8,
  },
  heart: {
    frames: [['.R.R.','RRRRR','RRRRR','RRRRR','.RRR.','..R..']],
    c: { R:'#e53935' }, w:5, h:6,
  },
}

// ─── ITEM SPRITES ────────────────────────────────────────────────────────────
const ITEM_SP = {
  heart:  { pixels:['.H.H.','.HHHH','HHHHH','HHHHH','.HHH.','..H..'], c:'#ff4d7d', w:5, h:6 },
  rapid:  { pixels:['..Y..','YYYYY','..Y..','YYYYY','..Y..'], c:'#ffeb3b', w:5, h:5 },
  bomb:   { pixels:['.OOO.','OOOOO','OOOOO','OOOOO','.OOO.'], c:'#ff9800', w:5, h:5 },
  slow:   { pixels:['BBBBB','B...B','B.B.B','B...B','BBBBB'], c:'#29b6f6', w:5, h:5 },
  double: { pixels:['GG.GG','G.G.G','GGGGG','G...G','G...G'], c:'#69f0ae', w:5, h:5 },
}
const ISC = 4  // item scale
function drawItem(item) {
  const sp = ITEM_SP[item.type]
  const x = Math.floor(item.x - sp.w*ISC/2)
  const y = Math.floor(item.y - sp.h*ISC/2 + Math.sin(item.wobble)*5)
  // 글로우
  ctx.globalAlpha = 0.25 + 0.15*Math.sin(item.wobble*2)
  ctx.fillStyle = sp.c
  ctx.beginPath(); ctx.arc(item.x, item.y, sp.w*ISC*0.7, 0, Math.PI*2); ctx.fill()
  ctx.globalAlpha = 1
  // 픽셀
  sp.pixels.forEach((row, ry) => [...row].forEach((ch, rx) => {
    if (ch === '.') return
    ctx.fillStyle = sp.c
    ctx.fillRect(x + rx*ISC, y + ry*ISC, ISC, ISC)
  }))
  // 라벨
  const labels = { heart:'HP', rapid:'RAPID', bomb:'BOMB', slow:'SLOW', double:'x2' }
  ctx.font = '700 8px "Courier New"'; ctx.textAlign = 'center'
  ctx.fillStyle = sp.c; ctx.fillText(labels[item.type], item.x, y - 6)
}
const SC = 5
function drawSprite(key, x, y, frame = 0, tint = null) {
  const s = SP[key]; const art = s.frames[frame % s.frames.length]
  art.forEach((row, ry) => [...row].forEach((ch, rx) => {
    if (ch === '.') return
    ctx.fillStyle = tint ?? s.c[ch] ?? '#fff'
    ctx.fillRect(Math.floor(x+rx*SC), Math.floor(y+ry*SC), SC, SC)
  }))
}

// ─── STARS ───────────────────────────────────────────────────────────────────
const stars = Array.from({length:100}, () => ({
  x: Math.random()*2000, y: Math.random()*1200,
  s: Math.random()<0.2?2:1, v: 0.3+Math.random()*0.6, b: 0.3+Math.random()*0.7,
}))
function updateStars(dt) {
  for (const st of stars) { st.x -= st.v; if (st.x<0) {st.x=canvas.width; st.y=Math.random()*canvas.height} }
}
function drawStars() {
  for (const st of stars) {
    ctx.fillStyle = `rgba(255,255,255,${st.b})`
    ctx.fillRect(Math.floor(st.x), Math.floor(st.y), st.s, st.s)
  }
}

// ─── SOUND ENGINE (Web Audio API 칩튠) ───────────────────────────────────────
const _ac = new (window.AudioContext || window.webkitAudioContext)()

let _soundMuted = false
function _beep(freq, dur, vol=0.3, type='square', freqEnd=null) {
  if (_soundMuted) return
  const o=_ac.createOscillator(), g=_ac.createGain()
  o.connect(g); g.connect(_ac.destination)
  o.type=type; o.frequency.setValueAtTime(freq, _ac.currentTime)
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, _ac.currentTime+dur)
  g.gain.setValueAtTime(vol, _ac.currentTime)
  g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime+dur)
  o.start(); o.stop(_ac.currentTime+dur)
}
function _seq(notes) {   // [{f, d, v?, t?}]
  if (_soundMuted) return
  let t=_ac.currentTime
  notes.forEach(n => {
    const o=_ac.createOscillator(), g=_ac.createGain()
    o.connect(g); g.connect(_ac.destination)
    o.type=n.t||'square'
    o.frequency.setValueAtTime(n.f, t)
    if (n.f2) o.frequency.exponentialRampToValueAtTime(n.f2, t+n.d)
    g.gain.setValueAtTime(n.v||0.25, t)
    g.gain.exponentialRampToValueAtTime(0.001, t+n.d)
    o.start(t); o.stop(t+n.d)
    t+=n.d
  })
}

// ─── BGM (배경음악) ──────────────────────────────────────────────────────────
const BGM = (() => {
  const BPM=140, B=60/BPM

  // 멜로디 [Hz, 박자] — 0=쉼표 / 총 16박자
  const MEL = [
    [784,0.5],[659,0.5],[698,0.5],[784,0.5],  // G5 E5 F5 G5
    [880,0.5],[784,0.5],[698,0.5],[659,0.5],  // A5 G5 F5 E5
    [587,0.5],[659,0.5],[698,0.5],[784,0.5],  // D5 E5 F5 G5
    [659,0.5],[0,0.5],[659,0.5],[0,0.5],      // E5 _ E5 _
    [784,0.5],[659,0.5],[698,0.5],[784,0.5],  // G5 E5 F5 G5
    [880,1  ],[784,0.5],[698,0.5],            // A5(긴) G5 F5
    [659,1  ],[587,0.5],[523,0.5],            // E5(긴) D5 C5
    [523,2  ],                                // C5(홀드)
  ]  // 합계: 16박자

  // 베이스 [Hz, 박자] — 총 16박자
  const BAS = [
    [196,1],[165,1],[175,1],[196,1],
    [196,1],[165,1],[175,1],[196,1],
    [147,1],[165,1],[175,1],[196,1],
    [165,2],[131,2],
  ]  // 합계: 16박자

  let active=false, muted=false, loopTimer=null

  function note(freq, t, dur, vol, type='square') {
    if (!freq || muted) return
    const o=_ac.createOscillator(), g=_ac.createGain()
    o.connect(g); g.connect(_ac.destination)
    o.type=type; o.frequency.value=freq
    g.gain.setValueAtTime(vol, t)
    g.gain.exponentialRampToValueAtTime(0.001, t+dur*0.85)
    o.start(t); o.stop(t+dur)
  }

  function scheduleLoop(startTime) {
    if (!active) return
    let mt=startTime
    MEL.forEach(([f,b])=>{ note(f, mt, b*B*0.85, 0.09); mt+=b*B })
    let bt=startTime
    BAS.forEach(([f,b])=>{ note(f, bt, b*B*0.55, 0.06,'triangle'); bt+=b*B })
    loopTimer = setTimeout(()=>scheduleLoop(startTime+(mt-startTime)), (mt-startTime-0.3)*1000)
  }

  return {
    start()  { if(active)return; active=true; _ac.resume().then(()=>scheduleLoop(_ac.currentTime+0.1)) },
    stop()   { active=false; clearTimeout(loopTimer) },
    toggle() { muted=!muted; _soundMuted=muted; return muted },
    isMuted(){ return muted },
  }
})()

function spawnParticles(g, x, y, color, count=14) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, spd = 60+Math.random()*140
    g.particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:1.2+Math.random()*1.2, sz:2+Math.random()*4, color})
  }
}

// ─── SHOOT ───────────────────────────────────────────────────────────────────
// power: 1=약한샷(윙크), 2=강한샷(양쪽눈)  g=게임 인스턴스
function tryShoot(g, x, y, power=1) {
  if (!g.canShoot || g.state !== 'playing') return
  g.canShoot = false
  const isStrong = power >= 2
  const damage = isStrong ? 2 : 1
  const flashSize = isStrong ? 100 : 48
  const flashColor = isStrong ? '#ff8c00' : '#ffe57f'
  g.flashScreen = isStrong ? 0.55 : 0.22
  if (isStrong) SFX.shootStrong(); else SFX.shootWeak()
  g.muzzleFlashes.push({x, y, life:1, size:flashSize, strong:isStrong})
  if (isStrong) g.muzzleFlashes.push({x, y, life:0.7, size:flashSize*1.4, strong:true})
  let hit=false, hitX=0, hitY=y
  for (let i=g.enemies.length-1; i>=0; i--) {
    const e=g.enemies[i], sw=SP[e.type].w*SC, sh=SP[e.type].h*SC
    const ex=e.x-sw/2, ey=e.y-sh/2
    if (x>=ex-8 && x<=ex+sw+8 && y>=ey-8 && y<=ey+sh+8) {
      e.hp -= damage; e.hitFlash=0.4; hitX=e.x; hitY=e.y
      if (e.hp<=0) {
        const combo = g.comboCount >= 2 ? g.comboCount : 1
        const pts = ESCORE[e.type] * g.wave * combo * (g.doubleTimer>0 ? 2 : 1)
        g.score += pts; g.comboCount++; g.comboTimer = COMBO_WINDOW
        if (g.comboCount >= 3) SFX.combo(Math.min(g.comboCount, 8)); else SFX.kill()
        if (Math.random() < ITEM_DROP_CHANCE) spawnItem(g, e.x, e.y)
        spawnParticles(g, e.x, e.y, ECOLOR[e.type], isStrong ? 32 : 18)
        g.shockwaves.push({x:e.x,y:e.y,r:0,life:1,color:ECOLOR[e.type]})
        g.shockwaves.push({x:e.x,y:e.y,r:0,life:0.7,color:'#fff'})
        if (isStrong) g.shockwaves.push({x:e.x,y:e.y,r:0,life:0.5,color:flashColor})
        const label = combo>=2 ? `+${pts} x${combo}!` : `+${pts}`
        g.scorePopups.push({x:e.x,y:e.y-10,text:label,life:1,combo:combo>=2})
        g.enemies.splice(i,1); g.shakeAmount = isStrong ? 14 : 7
      } else { g.shakeAmount = isStrong ? 7 : 4; SFX.hit() }
      hit=true; break
    }
  }
  if (!hit) {
    for (let i=g.items.length-1; i>=0; i--) {
      const it=g.items[i]
      if (Math.hypot(x-it.x, y-it.y) < 28) { collectItem(g, it); g.items.splice(i,1); hit=true; break }
    }
  }
  g.bulletTrails.push({x1:x,y1:y,x2:hit?hitX:0,y2:hitY,life:1,strong:isStrong})
  if (!hit) g.shakeAmount = isStrong ? 4 : 2
  const _g = g
  setTimeout(() => { _g.canShoot=true }, g.rapidTimer>0 ? 80 : isStrong ? 400 : 250)
}

// ─── ITEM LOGIC ──────────────────────────────────────────────────────────────
const ITEM_TYPES = ['heart','rapid','bomb','slow','double']
const ITEM_DROP_CHANCE = 0.28

function spawnItem(g, x, y) {
  const type = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)]
  g.items.push({ type, x, y, speed: 55+Math.random()*25, wobble: Math.random()*Math.PI*2 })
}

function collectItem(g, item) {
  spawnParticles(g, item.x, item.y, ITEM_SP[item.type].c, 20)
  g.shockwaves.push({x:item.x, y:item.y, r:0, life:1, color:ITEM_SP[item.type].c})
  g.itemFlash = { color: ITEM_SP[item.type].c, alpha: 0.45 }
  if (item.type === 'heart') {
    SFX.itemHeart(); g.lives = Math.min(g.lives+1, 5)
    g.scorePopups.push({x:item.x, y:item.y-10, text:'♥ +1 LIFE!', life:1, combo:true})
  } else if (item.type === 'rapid') {
    SFX.itemRapid(); g.rapidTimer = 5
    g.scorePopups.push({x:item.x, y:item.y-10, text:'RAPID FIRE!', life:1, combo:true})
  } else if (item.type === 'bomb') {
    SFX.itemBomb()
    g.scorePopups.push({x:item.x, y:item.y-10, text:'BOOM!!', life:1, combo:true})
    g.shakeAmount = 20; g.flashScreen = 0.8
    for (const e of g.enemies) {
      const combo = g.comboCount >= 2 ? g.comboCount : 1
      g.score += ESCORE[e.type] * g.wave * (g.doubleTimer>0?2:1) * combo
      spawnParticles(g, e.x, e.y, ECOLOR[e.type], 24)
      g.shockwaves.push({x:e.x, y:e.y, r:0, life:1, color:ECOLOR[e.type]})
      g.shockwaves.push({x:e.x, y:e.y, r:0, life:0.6, color:'#fff'})
      g.comboCount++; g.comboTimer = COMBO_WINDOW
    }
    g.enemies = []
  } else if (item.type === 'slow') {
    SFX.itemSlow(); g.slowTimer = 5
    g.scorePopups.push({x:item.x, y:item.y-10, text:'TIME SLOW!', life:1, combo:true})
  } else if (item.type === 'double') {
    SFX.itemDouble(); g.doubleTimer = 5
    g.scorePopups.push({x:item.x, y:item.y-10, text:'SCORE x2!', life:1, combo:true})
  }
}

// ─── GAME LOGIC ──────────────────────────────────────────────────────────────
function initGame(g) {
  g.score=0; g.lives=3; g.wave=1
  g.enemies=[]; g.particles=[]; g.flashes=[]; g.scorePopups=[]
  g.muzzleFlashes=[]; g.bulletTrails=[]; g.shockwaves=[]; g.items=[]
  g.spawned=0; g.spawnTimer=0; g.waveDelay=0
  g.comboCount=0; g.comboTimer=0
  g.rapidTimer=0; g.slowTimer=0; g.doubleTimer=0; g.itemFlash={color:'#fff',alpha:0}
  g.waveSize=5; g.spawnGap=2.14
  g.gameStartCooldown=1.5; g.scoreSubmitted=false; g.state='playing'
  g.gameOverCooldown=0; g.flashScreen=0; g.shakeAmount=0
}

function startGame() {
  if (_scoreOverlayTimer) { clearTimeout(_scoreOverlayTimer); _scoreOverlayTimer = null }
  hideScoreOverlay()
  SFX.gameStart(); BGM.start()
  twoPlayerWinner = 0
  cpuMode = gameMode === '1p-cpu'
  if (cpuMode) {
    cpu.target=null; cpu.reactTimer=0
    cpu.jitterX=0; cpu.jitterY=0; cpu.jitterTimer=0; cpu.shootCooldown=0
  }
  initGame(g1)
  if (gameMode==='2p' || cpuMode) initGame(g2)
}

function loseLife(g) {
  g.lives--; g.flashScreen=0.5
  if (g.lives<=0) {
    g.state='gameover'; g.gameOverCooldown=3.0
    if (gameMode==='2p' || cpuMode) {
      BGM.stop(); SFX.gameOver()
      const other = g===g1 ? g2 : g1
      if (other.state==='gameover') {
        twoPlayerWinner = g1.score > g2.score ? 1 : g2.score > g1.score ? 2 : 3
      } else {
        twoPlayerWinner = g===g1 ? 2 : 1
      }
    } else {
      SFX.gameOver(); BGM.stop()
      fetchLeaderboard().then(lb => {
        leaderboard=lb
        _scoreOverlayTimer = setTimeout(showScoreOverlay, 3000)
      })
    }
  } else { SFX.loseLife() }
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function updateGame(g, dt, gw) {
  g.gameStartCooldown = Math.max(0, g.gameStartCooldown-dt)
  g.gameOverCooldown  = Math.max(0, g.gameOverCooldown-dt)
  if (g.state==='playing') {
    g.spawnTimer -= dt
    if (g.spawnTimer<=0 && g.spawned<g.waveSize) {
      const type = ETYPES[Math.floor(Math.random()*ETYPES.length)]
      const margin = 60
      g.enemies.push({
        type, x: gw+30, y: margin+Math.random()*(canvas.height-margin*2),
        hp: EHP[type]+Math.floor(g.wave/4), maxHp: EHP[type]+Math.floor(g.wave/4),
        speed: ESPEED[type]*(1+g.wave*0.08)*(0.85+Math.random()*0.3),
        wobble: Math.random()*Math.PI*2, hitFlash:0, animFrame:0, animTimer:0,
      })
      g.spawned++; g.spawnTimer=g.spawnGap
    }
    for (let i=g.enemies.length-1; i>=0; i--) {
      const e=g.enemies[i]
      e.wobble += dt*(e.type==='bat'?5:2.5); e.x-=e.speed*(g.slowTimer>0?0.3:1)*dt
      e.hitFlash=Math.max(0,e.hitFlash-dt*4)
      e.animTimer+=dt; if(e.animTimer>0.4){e.animTimer=0;e.animFrame++}
      if (e.x<-60) { g.enemies.splice(i,1); loseLife(g) }
    }
    if (g.spawned>=g.waveSize && g.enemies.length===0) {
      SFX.waveClear()
      g.wave++; g.waveSize=4+g.wave; g.spawnGap=Math.max(1.0,2.2-g.wave*0.08)
      g.spawned=0; g.spawnTimer=0; g.waveDelay=3; g.state='waveclear'
    }
  }
  if (g.state==='waveclear') { g.waveDelay-=dt; if(g.waveDelay<=0) g.state='playing' }
  for (let i=g.particles.length-1;i>=0;i--) {
    const p=g.particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.life-=p.decay*dt
    if(p.life<=0) g.particles.splice(i,1)
  }
  for (let i=g.flashes.length-1;i>=0;i--) {
    const f=g.flashes[i]; f.r+=200*dt; f.a-=2.5*dt; if(f.a<=0) g.flashes.splice(i,1)
  }
  for (let i=g.scorePopups.length-1;i>=0;i--) {
    const p=g.scorePopups[i]; p.y-=40*dt; p.life-=2*dt; if(p.life<=0) g.scorePopups.splice(i,1)
  }
  g.flashScreen=Math.max(0,g.flashScreen-dt*4)
  g.shakeAmount=Math.max(0,g.shakeAmount-dt*40)
  if (g.comboCount>0) { g.comboTimer-=dt; if(g.comboTimer<=0) g.comboCount=0 }
  g.rapidTimer=Math.max(0,g.rapidTimer-dt); g.slowTimer=Math.max(0,g.slowTimer-dt); g.doubleTimer=Math.max(0,g.doubleTimer-dt)
  g.itemFlash.alpha = Math.max(0, g.itemFlash.alpha-dt*2)
  for (let i=g.items.length-1; i>=0; i--) {
    const it=g.items[i]
    it.x -= it.speed*(g.slowTimer>0?0.4:1)*dt; it.wobble+=dt*2.5
    if (it.x<-60) g.items.splice(i,1)
  }
  g.shakeX=g.shakeAmount>0.5?(Math.random()-0.5)*g.shakeAmount:0
  g.shakeY=g.shakeAmount>0.5?(Math.random()-0.5)*g.shakeAmount:0
  for (let i=g.muzzleFlashes.length-1;i>=0;i--) { g.muzzleFlashes[i].life-=dt*5; if(g.muzzleFlashes[i].life<=0) g.muzzleFlashes.splice(i,1) }
  for (let i=g.bulletTrails.length-1;i>=0;i--)  { g.bulletTrails[i].life-=dt*5;  if(g.bulletTrails[i].life<=0) g.bulletTrails.splice(i,1) }
  for (let i=g.shockwaves.length-1;i>=0;i--) {
    g.shockwaves[i].r+=280*dt; g.shockwaves[i].life-=dt*2.5; if(g.shockwaves[i].life<=0) g.shockwaves.splice(i,1)
  }
}

// ─── CPU AI ──────────────────────────────────────────────────────────────────
function updateCPU(dt, gw) {
  if (g2.state !== 'playing') return

  // 가장 위험한 적 또는 아이템 (x 좌표가 가장 작은 = 화면 왼쪽에 가장 가까운)
  let target = null
  for (const e of g2.enemies) {
    if (!target || e.x < target.x) target = e
  }
  for (const it of g2.items) {
    if (!target || it.x < target.x) target = it
  }

  // 타겟이 바뀌면 반응 딜레이 리셋
  if (target !== cpu.target) {
    cpu.target = target
    cpu.reactTimer = 0.5 + Math.random() * 0.5  // 0.5~1.0s 반응 시간
  }

  cpu.reactTimer   = Math.max(0, cpu.reactTimer   - dt)
  cpu.shootCooldown = Math.max(0, cpu.shootCooldown - dt)

  // 조준 흔들림 갱신
  cpu.jitterTimer -= dt
  if (cpu.jitterTimer <= 0) {
    cpu.jitterX = (Math.random() - 0.5) * 70  // ±35px 흔들림
    cpu.jitterY = (Math.random() - 0.5) * 70
    cpu.jitterTimer = 0.12 + Math.random() * 0.18
  }

  g2.faceVisible = true
  if (target && cpu.reactTimer <= 0) {
    // 타겟 + 흔들림 위치로 조준
    const tx = target.x + cpu.jitterX
    const ty = target.y + cpu.jitterY
    g2.crosshair.x += (tx - g2.crosshair.x) * Math.min(1, dt * 3.5)
    g2.crosshair.y += (ty - g2.crosshair.y) * Math.min(1, dt * 3.5)
    g2.crosshair.visible = true

    // 조준이 충분히 가까우면 발사
    const dist = Math.hypot(g2.crosshair.x - target.x, g2.crosshair.y - target.y)
    if (dist < 65 && cpu.shootCooldown <= 0 && g2.canShoot) {
      tryShoot(g2, g2.crosshair.x, g2.crosshair.y)
      cpu.shootCooldown = 0.2 + Math.random() * 0.3
    }
  } else if (!target) {
    // 적 없으면 중앙으로
    g2.crosshair.x += (gw/2 - g2.crosshair.x) * Math.min(1, dt * 2)
    g2.crosshair.y += (canvas.height/2 - g2.crosshair.y) * Math.min(1, dt * 2)
    g2.crosshair.visible = true
  }
}

function update(dt) {
  const gw = (gameMode==='2p' || cpuMode) ? canvas.width/2 : canvas.width
  updateStars(dt)
  if (twoPlayerWinner===0) updateGame(g1, dt, gw)
  if ((gameMode==='2p' || cpuMode) && twoPlayerWinner===0) {
    updateGame(g2, dt, gw)
    if (cpuMode) updateCPU(dt, gw)
  }
}
let frameTime = 0

// ─── DRAW EFFECTS ────────────────────────────────────────────────────────────
function drawEnemies(g) {
  for (const e of g.enemies) {
    const sw=SP[e.type].w*SC, sh=SP[e.type].h*SC
    const wy=e.type==='bat'?Math.sin(e.wobble)*8:Math.sin(e.wobble)*2
    const x=Math.floor(e.x-sw/2), y=Math.floor(e.y-sh/2+wy)
    drawSprite(e.type,x,y,e.animFrame,e.hitFlash>0?'#ffffff':null)
    if (e.maxHp>1) {
      ctx.fillStyle='#222'; ctx.fillRect(x,y-8,sw,4)
      const r=e.hp/e.maxHp
      ctx.fillStyle=r>0.5?'#4caf50':r>0.25?'#ffeb3b':'#f44336'
      ctx.fillRect(x,y-8,Math.floor(sw*r),4)
    }
  }
}
function drawParticles(g) {
  for (const p of g.particles) { ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.sz),Math.ceil(p.sz)) }
  ctx.globalAlpha=1
}
function drawFlashes(g) {
  for (const f of g.flashes) { ctx.globalAlpha=Math.max(0,f.a); ctx.strokeStyle=f.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.stroke() }
  ctx.globalAlpha=1
}
function drawScorePopups(g) {
  for (const p of g.scorePopups) {
    ctx.globalAlpha=Math.max(0,p.life)
    drawText(p.text,Math.floor(p.x),Math.floor(p.y),p.combo?'#ff9800':'#ffeb3b',p.combo?4:3)
  }
  ctx.globalAlpha=1
}
function drawMuzzleFlashes(g) {
  for (const f of g.muzzleFlashes) {
    const a=Math.max(0,f.life), sz=f.size*(1.8-f.life*0.8)
    const grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,sz)
    grad.addColorStop(0,`rgba(255,255,255,${a})`); grad.addColorStop(0.25,`rgba(255,230,100,${a*0.9})`)
    grad.addColorStop(0.6,`rgba(255,150,30,${a*0.5})`); grad.addColorStop(1,`rgba(255,80,0,0)`)
    ctx.globalAlpha=1; ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(f.x,f.y,sz,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha=a*0.9; ctx.strokeStyle='#ffe57f'; ctx.lineWidth=Math.max(1,3*a)
    for (let r=0;r<8;r++) {
      const angle=(r/8)*Math.PI*2, len=sz*(1.4+(r%2)*0.4)
      ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(f.x+Math.cos(angle)*len,f.y+Math.sin(angle)*len); ctx.stroke()
    }
  }
  ctx.globalAlpha=1
}
function drawBulletTrails(g) {
  for (const t of g.bulletTrails) {
    const a=Math.max(0,t.life)
    if (t.strong) {
      ctx.globalAlpha=a*0.6; ctx.strokeStyle='#ff8c00'; ctx.lineWidth=9*a; ctx.lineCap='round'
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
      ctx.globalAlpha=a; ctx.strokeStyle='#fff'; ctx.lineWidth=3*a
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
    } else {
      ctx.globalAlpha=a*0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=4*a; ctx.lineCap='round'
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
      ctx.globalAlpha=a*0.8; ctx.strokeStyle='#ffe57f'; ctx.lineWidth=1.5*a
      ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke()
    }
  }
  ctx.globalAlpha=1; ctx.lineCap='butt'
}
function drawShockwaves(g) {
  for (const s of g.shockwaves) {
    ctx.globalAlpha=Math.max(0,s.life*0.7); ctx.strokeStyle=s.color; ctx.lineWidth=Math.max(1,4*s.life)
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.stroke()
  }
  ctx.globalAlpha=1
}
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16)
  return `${r},${g},${b}`
}

function drawHUD(g, gw) {
  const pad=14, sz=3
  drawText(`SCORE:${g.score}`, pad, pad, '#fff', sz)
  const wt=`WAVE ${g.wave}`
  drawText(wt, gw/2-textW(wt,sz)/2, pad, '#ffeb3b', sz)
  for (let i=0;i<5;i++) {
    const hx=gw-pad-(5-i)*(SP.heart.w*SC+6)
    drawSprite('heart',hx,pad,0,i<g.lives?null:'#1a1a2e')
  }
  const effects = []
  if (g.rapidTimer>0)  effects.push({label:`RAPID ${g.rapidTimer.toFixed(1)}s`, color:'#ffeb3b'})
  if (g.slowTimer>0)   effects.push({label:`SLOW ${g.slowTimer.toFixed(1)}s`,   color:'#29b6f6'})
  if (g.doubleTimer>0) effects.push({label:`x2 ${g.doubleTimer.toFixed(1)}s`,   color:'#69f0ae'})
  effects.forEach((ef, i) => {
    ctx.font='700 10px "Courier New"'; ctx.textAlign='left'; ctx.fillStyle=ef.color
    ctx.globalAlpha=0.8+0.2*Math.sin(Date.now()/200)
    ctx.fillText(ef.label, pad, canvas.height-56-i*20); ctx.globalAlpha=1
  })
  if (g.comboCount>=2) {
    const ct=`x${g.comboCount} COMBO!`, cs=3
    const pulse=0.7+0.3*Math.sin(Date.now()/120)
    ctx.globalAlpha=pulse
    drawText(ct, gw/2-textW(ct,cs)/2, canvas.height-52, '#ffeb3b', cs)
    ctx.globalAlpha=1
    const bw=120, bh=4, bx=gw/2-bw/2, by=canvas.height-28
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh)
    const ratio=g.comboTimer/COMBO_WINDOW
    ctx.fillStyle=ratio>0.5?'#ffeb3b':ratio>0.25?'#ff9800':'#f44336'
    ctx.fillRect(bx,by,Math.floor(bw*ratio),bh)
  }
}
function drawCrosshair(ch, power, startCd, p2=false, isCPU=false) {
  const {x,y}=ch, size=38, gap=8
  const strong=power>=2&&startCd<=0, weak=power===1&&startCd<=0
  const baseColor=isCPU?'#ff6d00':p2?'#00e5ff':'#00ff88'
  const weakColor=isCPU?'#ff9800':p2?'#ff6ec7':'#ffeb3b'
  const strongColor=isCPU?'#dd2c00':p2?'#ff1744':'#ff8c00'
  const color=strong?strongColor:weak?weakColor:baseColor
  ctx.fillStyle=color
  ctx.fillRect(x-size-gap,y-1,size,2); ctx.fillRect(x+gap+1,y-1,size,2)
  ctx.fillRect(x-1,y-size-gap,2,size); ctx.fillRect(x-1,y+gap+1,2,size)
  ctx.fillRect(x-2,y-2,4,4)
  const label=isCPU?'CPU':p2?'P2':'P1'
  ctx.font='700 9px "Courier New"'; ctx.textAlign='center'
  ctx.fillStyle=color; ctx.fillText(label, x, y-size-gap-4)
  if (strong) {
    ctx.globalAlpha=0.30; ctx.fillStyle=strongColor; ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill()
    ctx.globalAlpha=0.15; ctx.beginPath(); ctx.arc(x,y,60,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1
  } else if (weak) {
    ctx.globalAlpha=0.20; ctx.fillStyle=weakColor; ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1
  }
}
function drawWaveBanner(g, gw) {
  const msg=`WAVE  ${g.wave}  CLEAR!`, sz=5
  const x=gw/2-textW(msg,sz)/2, y=canvas.height/2-sz*5/2
  const alpha=Math.min(1,g.waveDelay)*(g.waveDelay<1?g.waveDelay:1)
  ctx.globalAlpha=alpha
  drawText(msg,x+2,y+2,'#000',sz); drawText(msg,x,y,'#ffeb3b',sz)
  ctx.globalAlpha=1
  const sub='GET READY!', ss=2
  ctx.globalAlpha=alpha*(0.5+0.5*Math.sin(Date.now()/300))
  drawText(sub,gw/2-textW(sub,ss)/2,y+sz*7,'#00ff88',ss)
  ctx.globalAlpha=1
}

// ─── LEADERBOARD DRAW ────────────────────────────────────────────────────────
// ctx.fillText 사용 — 한글 포함 모든 닉네임 표시 가능
function drawLeaderboard(cx, startY, highlightNick, maxRows=20) {
  const rowH=14, font='11px "Courier New", monospace'
  ctx.font = '700 11px "Courier New", monospace'
  ctx.textAlign = 'center'
  ctx.fillStyle = '#ffeb3b'
  ctx.fillText('# RANKING', cx, startY+10)

  if (leaderboard.length===0) {
    ctx.globalAlpha=0.4; ctx.fillStyle='#888'
    ctx.font = font
    ctx.fillText('NO DATA YET', cx, startY+28)
    ctx.globalAlpha=1; ctx.textAlign='left'; return
  }

  // 단일 열, 닉네임 잘라내지 않음
  const entries = leaderboard.slice(0, maxRows)
  const nickX = cx - 110
  const scoreX = cx + 110

  ctx.font = font
  entries.forEach((entry, i) => {
    const y     = startY + 24 + i * rowH
    const isMe  = highlightNick && entry.nick.toLowerCase() === highlightNick.toLowerCase()
    const color = isMe ? '#00ff88' : (i===0?'#ffd700': i===1?'#c0c0c0': i===2?'#cd7f32':'#bbb')

    if (isMe) {
      ctx.fillStyle = 'rgba(0,255,136,0.10)'
      ctx.fillRect(nickX-28, y-11, scoreX-nickX+56, rowH)
    }

    ctx.fillStyle = color
    ctx.textAlign = 'right'
    ctx.fillText(`${i+1}.`, nickX-6, y)
    ctx.textAlign = 'left'
    ctx.fillText(entry.nick, nickX, y)
    ctx.textAlign = 'right'
    ctx.fillText(entry.score.toLocaleString(), scoreX, y)
  })
  ctx.textAlign = 'left'
}

// ─── START SCREEN ────────────────────────────────────────────────────────────
function drawStartScreen() {
  const cx=canvas.width/2, cy=canvas.height/2
  const title='BLINK FIRE', ts=6
  drawText(title, cx-textW(title,ts)/2+3, cy-180+3, '#000', ts)
  drawText(title, cx-textW(title,ts)/2,   cy-180,   '#ffeb3b', ts)
  const lines=[{t:'MOVE YOUR HEAD TO AIM',c:'#555',s:2},{t:'BLINK TO SHOOT',c:'#555',s:2}]
  lines.forEach((l,i)=>{ drawText(l.t, cx-textW(l.t,l.s)/2, cy-110+i*22, l.c, l.s) })
  drawSprite('slime',cx-72,cy-58); drawSprite('bat',cx-12,cy-54); drawSprite('skeleton',cx+44,cy-58)

  // 모드 선택 버튼 (3개)
  const ms=3
  const modes=[
    {key:'1p-rank', label:'RANKING', col:'#ffeb3b'},
    {key:'1p-cpu',  label:'VS CPU',  col:'#00ff88'},
    {key:'2p',      label:'2P VS',   col:'#00e5ff'},
  ]
  // 버튼 폭 계산 후 전체 가운데 정렬
  const bGap=16
  const bWidths = modes.map(m=>textW(m.label,ms)+16)
  const totalW  = bWidths.reduce((a,b)=>a+b,0) + bGap*(modes.length-1)
  let bx = cx - totalW/2
  const my=cy-8
  modes.forEach((m,i)=>{
    const sel=gameMode===m.key
    const bw=bWidths[i]
    ctx.strokeStyle=sel?m.col:'#2a2a4a'; ctx.lineWidth=2
    ctx.strokeRect(bx-0,my-6,bw,ms*5+12)
    drawText(m.label, bx+8, my, sel?m.col:'#444', ms)
    bx += bw + bGap
  })

  const hint2='PRESS 1  2  3 TO SELECT', h2s=1
  drawText(hint2, cx-textW(hint2,h2s)/2, my+ms*5+18, '#333', h2s)

  const st='BLINK LONG TO START', ss=3
  ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()/500)
  drawText(st, cx-textW(st,ss)/2, cy+32, '#00ff88', ss)
  ctx.globalAlpha=1

  // 2P 얼굴 감지
  if (gameMode==='2p' && g1.faceVisible && g2.faceVisible) {
    const p2t='2P READY!', p2s=2
    ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()/300)
    drawText(p2t, cx-textW(p2t,p2s)/2, cy+58, '#00e5ff', p2s)
    ctx.globalAlpha=1
  }
  drawLeaderboard(cx, cy+72, g1.playerNick, 20)
}

// ─── GAME OVER SCREEN (1P) ────────────────────────────────────────────────────
function drawGameOver(g, gw) {
  if (!document.getElementById('scoreOverlay').classList.contains('hidden')) return
  const cx=gw/2, cy=canvas.height/2
  const go='GAME OVER', gs=5
  drawText(go, cx-textW(go,gs)/2+2, cy-80+2, '#000', gs)
  drawText(go, cx-textW(go,gs)/2,   cy-80,   '#f44336', gs)
  const sc=`SCORE:${g.score}`, ss=3
  drawText(sc, cx-textW(sc,ss)/2, cy-20, '#fff', ss)
  drawText(`WAVE:${g.wave}`, cx-textW(`WAVE:${g.wave}`,ss)/2, cy+4, '#ffeb3b', ss)
  if (g.gameOverCooldown<=0) {
    const rtt='BLINK LONG TO RETRY', rs2=2
    ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()/500)
    drawText(rtt, cx-textW(rtt,rs2)/2, cy+36, '#00ff88', rs2)
    ctx.globalAlpha=1
  }
}

// ─── VICTORY SCREEN (2P / 1P vs CPU) ─────────────────────────────────────────
function drawVictoryScreen() {
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,canvas.width,canvas.height)
  const cx=canvas.width/2, cy=canvas.height/2
  if (twoPlayerWinner===3) {
    const msg='DRAW!', sz=8
    drawText(msg, cx-textW(msg,sz)/2+4, cy-70+4, '#000', sz)
    drawText(msg, cx-textW(msg,sz)/2, cy-70, '#ffeb3b', sz)
  } else {
    let wn, col
    if (cpuMode) {
      wn  = twoPlayerWinner===1 ? 'YOU WIN!' : 'CPU WINS!'
      col = twoPlayerWinner===1 ? '#00ff88'  : '#ff6d00'
    } else {
      wn  = `P${twoPlayerWinner} WINS!`
      col = twoPlayerWinner===1 ? '#00ff88' : '#00e5ff'
    }
    const sz=7
    drawText(wn, cx-textW(wn,sz)/2+3, cy-70+3, '#000', sz)
    drawText(wn, cx-textW(wn,sz)/2, cy-70, col, sz)
  }
  const l1 = cpuMode ? 'YOU' : 'P1', l2 = cpuMode ? 'CPU' : 'P2'
  const c1w = twoPlayerWinner===1 ? '#00ff88' : '#888'
  const c2w = twoPlayerWinner===2 ? (cpuMode?'#ff6d00':'#00e5ff') : '#888'
  const s1=`${l1}: ${g1.score.toLocaleString()}`, s2=`${l2}: ${g2.score.toLocaleString()}`, ss=3
  drawText(s1, cx-textW(s1,ss)/2, cy+8,  c1w, ss)
  drawText(s2, cx-textW(s2,ss)/2, cy+32, c2w, ss)
  const rtt='BLINK LONG TO PLAY AGAIN', rs=2
  ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()/500)
  drawText(rtt, cx-textW(rtt,rs)/2, cy+66, '#00ff88', rs)
  ctx.globalAlpha=1
}

// ─── DRAW ONE GAME HALF ───────────────────────────────────────────────────────
function drawGameHalf(g, ox, gw, isP2, isCPU=false) {
  ctx.save()
  ctx.beginPath(); ctx.rect(ox,0,gw,canvas.height); ctx.clip()
  ctx.translate(ox,0)
  if (g.state==='gameover') {
    drawGameOver(g, gw)
  } else {
    ctx.save(); ctx.translate(g.shakeX,g.shakeY)
    drawBulletTrails(g); drawEnemies(g); drawShockwaves(g)
    drawParticles(g); drawFlashes(g); drawMuzzleFlashes(g); drawScorePopups(g)
    for (const it of g.items) drawItem(it)
    ctx.restore()
    drawHUD(g,gw); if(g.state==='waveclear') drawWaveBanner(g,gw)
  }
  if (g.itemFlash.alpha>0) { ctx.fillStyle=`rgba(${hexToRgb(g.itemFlash.color)},${g.itemFlash.alpha.toFixed(2)})`; ctx.fillRect(0,0,gw,canvas.height) }
  if (g.flashScreen>0) { ctx.fillStyle=`rgba(255,200,100,${g.flashScreen})`; ctx.fillRect(0,0,gw,canvas.height) }
  for (let y=0;y<canvas.height;y+=4) { ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.fillRect(0,y,gw,2) }
  if (g.crosshair.visible) drawCrosshair(g.crosshair, g.blinkPower, g.gameStartCooldown, isP2, isCPU)
  if (!isCPU && !g.faceVisible && (g.state==='playing'||g.state==='waveclear')) {
    const hint='SHOW YOUR FACE', sz=2
    ctx.globalAlpha=0.4+0.4*Math.sin(Date.now()/500)
    drawText(hint,gw/2-textW(hint,sz)/2,canvas.height-52,'#888',sz)
    ctx.globalAlpha=1
  }
  ctx.restore()
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw() {
  const gw = (gameMode==='2p' || cpuMode) ? canvas.width/2 : canvas.width
  ctx.fillStyle='#06060f'; ctx.fillRect(0,0,canvas.width,canvas.height)
  drawStars()
  if (g1.state==='start') {
    drawStartScreen()
  } else if (gameMode==='2p' || cpuMode) {
    drawGameHalf(g1, 0, gw, false, false)
    drawGameHalf(g2, gw, gw, true, cpuMode)
    // 중앙 구분선
    ctx.fillStyle='#2a2a4a'; ctx.fillRect(gw-1,0,2,canvas.height)
    if (twoPlayerWinner>0) drawVictoryScreen()
  } else {
    drawGameHalf(g1, 0, gw, false, false)
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let lastTime=0
function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts
  update(dt); draw(); requestAnimationFrame(loop)
}
requestAnimationFrame(loop)

// ─── SCORE OVERLAY (게임오버 — 단일 화면) ────────────────────────────────────
const scoreOverlay = document.getElementById('scoreOverlay')
const nickInput    = document.getElementById('nickInput')
const nickForm     = document.getElementById('nickForm')
const submitBtn    = document.getElementById('submitBtn')
const doneMsg      = document.getElementById('doneMsg')
const retryBtn     = document.getElementById('retryBtn')

function renderLbPreview() {
  const rowsA = document.getElementById('lbRowsA')
  const rowsB = document.getElementById('lbRowsB')
  if (!leaderboard.length) { rowsA.textContent = '아직 기록이 없어요'; rowsB.textContent=''; return }
  const makeRow = (e, i) => {
    const isMe = g1.playerNick && e.nick.toUpperCase() === g1.playerNick.toUpperCase()
    const cls  = isMe ? 'lb-row lb-me' : 'lb-row'
    return `<div class="${cls}">
      <span class="lb-rank">${i+1}.</span>
      <span class="lb-nick">${e.nick.slice(0,8)}</span>
      <span class="lb-sc">${e.score.toLocaleString()}</span>
    </div>`
  }
  rowsA.innerHTML = leaderboard.slice(0, 10).map(makeRow).join('')
  rowsB.innerHTML = leaderboard.slice(10, 20).map((e,i) => makeRow(e, i+10)).join('')
}

function showScoreOverlay() {
  document.getElementById('finalScore').textContent = g1.score
  document.getElementById('finalWave').textContent  = g1.wave
  nickForm.classList.remove('hidden')
  doneMsg.classList.add('hidden')
  nickInput.value = ''
  submitBtn.textContent = 'SUBMIT SCORE'
  submitBtn.disabled = false
  renderLbPreview()
  scoreOverlay.classList.remove('hidden')
  setTimeout(() => nickInput.focus(), 100)
}

function hideScoreOverlay() {
  scoreOverlay.classList.add('hidden')
}

function showDone(msg) {
  nickForm.classList.add('hidden')
  doneMsg.textContent = msg
  doneMsg.classList.remove('hidden')
  renderLbPreview()
}

async function doSubmit() {
  const n = nickInput.value.trim()
  if (!n) { nickInput.focus(); return }
  g1.playerNick = n
  submitBtn.textContent = '등록 중...'
  submitBtn.disabled = true
  await submitScore(g1.playerNick, g1.score)
  leaderboard = await fetchLeaderboard()
  g1.scoreSubmitted = true
  localStorage.setItem('blinkfire_nick', g1.playerNick)
  showDone('🏆 랭킹 등록 완료!')
}

submitBtn.addEventListener('click', doSubmit)
nickInput.addEventListener('keydown', e => { if (e.key==='Enter') doSubmit() })
retryBtn.addEventListener('click', () => { hideScoreOverlay(); startGame() })

// ─── INPUT: 데스크탑 마우스 ───────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (isMobile) return
  if (!scoreOverlay.classList.contains('hidden')) return
  if (g1.state==='start' || twoPlayerWinner>0) { startGame(); return }
  const gw = (gameMode==='2p' || cpuMode) ? canvas.width/2 : canvas.width
  if (gameMode==='2p') {
    if (e.clientX < gw) { if (!g1.faceVisible) tryShoot(g1, e.clientX, e.clientY) }
    else                { if (!g2.faceVisible) tryShoot(g2, e.clientX-gw, e.clientY) }
  } else if (cpuMode) {
    // 왼쪽 절반만 플레이어 영역 (오른쪽은 CPU)
    if (e.clientX < gw && !g1.faceVisible) tryShoot(g1, e.clientX, e.clientY)
  } else {
    if (g1.state==='playing' && !g1.faceVisible) tryShoot(g1, e.clientX, e.clientY)
    else if (g1.state==='gameover') startGame()
  }
})
canvas.addEventListener('mousemove', e => {
  if (isMobile) return
  const gw = (gameMode==='2p' || cpuMode) ? canvas.width/2 : canvas.width
  if (!g1.faceVisible) {
    if (cpuMode || gameMode==='2p') {
      if (e.clientX < gw) { g1.crosshair.x=e.clientX; g1.crosshair.y=e.clientY; g1.crosshair.visible=true }
    } else {
      g1.crosshair.x=e.clientX; g1.crosshair.y=e.clientY; g1.crosshair.visible=true
    }
  }
  if (gameMode==='2p' && !g2.faceVisible) { g2.crosshair.x=e.clientX-gw; g2.crosshair.y=e.clientY; g2.crosshair.visible=true }
})
canvas.addEventListener('mouseleave', () => {
  if (!isMobile && !g1.faceVisible) g1.crosshair.visible=false
  if (!isMobile && !cpuMode && !g2.faceVisible) g2.crosshair.visible=false
})

// ─── INPUT: 모바일 터치 ────────────────────────────────────────────────────────
if (isMobile) {
  let _touchStartX=0, _touchStartY=0, _touchStartTime=0

  canvas.addEventListener('touchstart', e => {
    e.preventDefault()
    const t = e.touches[0]
    _touchStartX = t.clientX; _touchStartY = t.clientY; _touchStartTime = Date.now()
    g1.crosshair.x = t.clientX; g1.crosshair.y = t.clientY; g1.crosshair.visible = true
    if ((g1.state==='start' || g1.state==='gameover') && g1.gameOverCooldown <= 0) {
      if (scoreOverlay.classList.contains('hidden')) startGame()
    }
  }, { passive:false })

  canvas.addEventListener('touchmove', e => {
    e.preventDefault()
    const t = e.touches[0]
    g1.crosshair.x = t.clientX; g1.crosshair.y = t.clientY
  }, { passive:false })

  canvas.addEventListener('touchend', e => {
    e.preventDefault()
    if (g1.state !== 'playing') return
    const dur = Date.now() - _touchStartTime
    const dx = e.changedTouches[0].clientX - _touchStartX
    const dy = e.changedTouches[0].clientY - _touchStartY
    const moved = Math.hypot(dx, dy)
    if (dur < 250 && moved < 18) tryShoot(g1, g1.crosshair.x, g1.crosshair.y)
  }, { passive:false })
}

// ─── MEDIAPIPE FACE MESH ──────────────────────────────────────────────────────
function eyeAR(lm,top,bot,outer,inner) {
  const h=Math.hypot(lm[top].x-lm[bot].x,lm[top].y-lm[bot].y)
  const w=Math.hypot(lm[outer].x-lm[inner].x,lm[outer].y-lm[inner].y)
  return w>0?h/w:1
}

const BLINK_THRESH = 0.18
const HEAD_SENS_X  = 2.2
const HEAD_SENS_Y  = 2.0

const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
})
faceMesh.setOptions({ maxNumFaces:2, refineLandmarks:true, minDetectionConfidence:0.6, minTrackingConfidence:0.5 })

// g = 게임 인스턴스, gw = 게임 너비(로컬 좌표계)
function processFace(lm, g, gw) {
  const ch = g.crosshair
  const rawX=((1-lm[1].x)-0.5)*gw*HEAD_SENS_X + gw/2
  const rawY=(lm[1].y-0.4)*canvas.height*HEAD_SENS_Y + canvas.height/2
  if (!ch.visible) { ch.x=rawX; ch.y=rawY }
  else {
    const dist=Math.hypot(rawX-ch.x, rawY-ch.y)
    const smooth=Math.min(0.85, 0.2+dist/120)
    ch.x=smooth*rawX+(1-smooth)*ch.x
    ch.y=smooth*rawY+(1-smooth)*ch.y
  }
  ch.visible=true; g.faceVisible=true

  const earL=eyeAR(lm,159,145,33,133), earR=eyeAR(lm,386,374,362,263)
  const leftClosed=earL<BLINK_THRESH, rightClosed=earR<BLINK_THRESH
  const bothClosed=leftClosed&&rightClosed
  const oneClosed=(leftClosed||rightClosed)&&!bothClosed
  const nowBlink=leftClosed||rightClosed
  g.blinkPower=bothClosed?2:oneClosed?1:0

  if (nowBlink && g.blinkStart===0) { g.blinkStart=Date.now(); g.blinkType=bothClosed?2:1 }
  if (!nowBlink && g.blinkStart>0) {
    const dur=Date.now()-g.blinkStart; g.blinkStart=0
    if (dur>60&&dur<450&&g.gameStartCooldown<=0&&g.state==='playing') tryShoot(g,ch.x,ch.y,g.blinkType)
    else if (dur>=800 && g.gameOverCooldown<=0) {
      const overlay = document.getElementById('scoreOverlay')
      if ((g.state==='start'||g.state==='gameover'||twoPlayerWinner>0) && overlay.classList.contains('hidden')) startGame()
    }
    g.blinkType=0
  }
}

faceMesh.onResults(results => {
  const faces = results.multiFaceLandmarks || []
  const gw = (gameMode==='2p' || cpuMode) ? canvas.width/2 : canvas.width

  // 2P 모드: 코 x 좌표 기준 정렬 (큰 쪽 = 카메라 오른쪽 = 물리적 왼쪽 = P1)
  const sorted = faces.length >= 2
    ? [...faces].sort((a,b) => b[1].x - a[1].x)
    : faces

  if (sorted.length >= 1) {
    processFace(sorted[0], g1, gw)
  } else {
    g1.faceVisible=false; g1.crosshair.visible=false; g1.blinkPower=0
  }

  // CPU 모드에서는 g2를 얼굴로 제어하지 않음
  if (!cpuMode) {
    if (sorted.length >= 2) {
      processFace(sorted[1], g2, gameMode==='2p' ? gw : canvas.width)
    } else {
      g2.faceVisible=false; g2.crosshair.visible=false; g2.blinkPower=0
    }
  }
})

// ─── CAMERA ──────────────────────────────────────────────────────────────────
const camGuide   = document.getElementById('camGuide')
let cameraActive = false

function startCamera() {
  const _alert = window.alert
  window.alert = () => {}   // MediaPipe 내부 alert() 차단

  camCv.width = 200; camCv.height = 150   // 한 번만 설정 (매 프레임 설정 시 캔버스 지워짐)

  let _mpBusy = false   // 이전 프레임 처리 중이면 skip (카메라 멈춤 방지)
  const cam = new Camera(video, {
    onFrame: async () => {
      if (_mpBusy) return
      _mpBusy = true
      try {
        camCtx.drawImage(video, 0, 0, camCv.width, camCv.height)
        await faceMesh.send({ image: video })
      } finally {
        _mpBusy = false
      }
    },
    width: 480, height: 360,
  })

  cam.start()
    .then(() => {
      window.alert = _alert
      cameraActive = true
      loading.classList.add('hidden')
      fetchLeaderboard().then(lb => { leaderboard=lb; lbLoaded=true })
    })
    .catch(() => {
      window.alert = _alert
      cameraActive = false
      // 주소창 안내 메시지 표시 → 5초 후 게임으로 진입
      loading.querySelector('.px-sub').textContent  = '카메라가 차단돼 있어요'
      loading.querySelector('.px-hint').textContent = '아래 안내를 따라주세요'
      camGuide.style.display = 'block'
      fetchLeaderboard().then(lb => { leaderboard=lb })
      setTimeout(() => loading.classList.add('hidden'), 5000)
    })
}

if (isMobile) {
  // 모바일: 게임 차단, 안내 화면 표시
  document.getElementById('mobileBlock').style.display = 'flex'
  loading.classList.add('hidden')
} else {
  startCamera()
}
</script>
